<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0F1E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nacho"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon2.png"/>
<link rel="apple-touch-icon-precomposed" href="icon2.png"/>
<link rel="icon" type="image/png" href="icon2.png"/>
<title>Nacho</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>

:root {
  --top: env(safe-area-inset-top, 54px);
  --bot: env(safe-area-inset-bottom, 20px);
  --left: env(safe-area-inset-left, 0px);
  --right: env(safe-area-inset-right, 0px);
  /* Brand */
  --orange:    #F97316;
  --orange2:   #EA6C0A;
  --orange-l:  rgba(249,115,22,0.12);
  /* Backgrounds */
  --bg:        #F2F0EB;
  --card:      #FFFFFF;
  --navy:      #0A0A1A;
  --navy2:     #14142A;
  --navy3:     #1E1E38;
  /* Semantic */
  --green:     #059669;
  --green-l:   rgba(5,150,105,0.1);
  --red:       #DC2626;
  --red-l:     rgba(220,38,38,0.1);
  --purple:    #7C3AED;
  --purple-l:  rgba(124,58,237,0.1);
  --blue:      #2563EB;
  --blue-l:    rgba(37,99,235,0.1);
  /* Text */
  --t1:  #0A0A1A;
  --t2:  #374151;
  --t3:  #6B7280;
  --t4:  #9CA3AF;
  /* Layout */
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html {
  background: var(--navy);
  overscroll-behavior: none;
}
body {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', Helvetica, sans-serif;
  background: var(--bg);
  max-width: 430px; margin: 0 auto;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
#app-scroll { display: contents; }
input, select, button, textarea { font-family: inherit; }
.hidden { display: none !important; }

/* ── LOCK ─────────────────────────────────────────────────────────────── */
#lock-screen {
  position: fixed; inset: 0;
  background: var(--navy);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999;
  padding: calc(var(--top) + 24px) 32px calc(var(--bot) + 24px);
  /* Ensure full cover on iOS PWA */
  min-height: 100vh;
  min-height: -webkit-fill-available;
}
.lock-logo {
  width: 84px; height: 84px; border-radius: 24px;
  overflow: hidden; margin-bottom: 24px;
  box-shadow: 0 0 0 1px rgba(249,115,22,.3), 0 20px 60px rgba(249,115,22,.2);
}
.lock-logo svg { width: 100%; height: 100%; display: block; }
.lock-appname {
  font-size: 34px; font-weight: 800; color: white;
  letter-spacing: -1px; margin-bottom: 6px;
}
.lock-tagline {
  font-size: 14px; color: rgba(255,255,255,.35);
  margin-bottom: 40px; letter-spacing: .2px;
}
.lock-input-wrap { width: 100%; position: relative; margin-bottom: 14px; }
.lock-input {
  width: 100%; padding: 18px 20px;
  border-radius: var(--r-md); border: 1.5px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.06);
  color: white; font-size: 17px; letter-spacing: 3px; text-align: center;
  outline: none; -webkit-appearance: none;
  transition: border-color .2s;
}
.lock-input::placeholder { letter-spacing: 0; color: rgba(255,255,255,.2); font-size: 15px; }
.lock-input:focus { border-color: var(--orange); background: rgba(249,115,22,.06); }
.lock-btn {
  width: 100%; padding: 18px;
  border-radius: var(--r-md); border: none;
  background: var(--orange); color: white;
  font-size: 17px; font-weight: 700; cursor: pointer;
  letter-spacing: -.2px;
  transition: background .15s, transform .1s;
}
.lock-btn:active { background: var(--orange2); transform: scale(.98); }
.faceid-btn {
  width: 100%; padding: 16px; margin-top: 12px;
  border-radius: var(--r-md); border: 1.5px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04); color: rgba(255,255,255,.6);
  font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background .15s;
}
.faceid-btn:active { background: rgba(255,255,255,.1); }
.lock-switch {
  background: none; border: none; color: rgba(255,255,255,.2);
  font-size: 13px; cursor: pointer; margin-top: 12px; display: block;
  width: 100%; text-align: center; padding: 6px;
}
.lock-loading { display:flex; align-items:center; gap:10px; color:var(--orange); font-size:14px; font-weight:600; }
.lock-err { color: #FCA5A5; font-size: 13px; margin-top: 10px; text-align: center; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DYNAMIC ISLAND ──────────────────────────────────────────────────── */
.di-bar { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:calc(var(--top) + 4px); background:var(--navy); z-index:98; pointer-events:none; }
.di-pill { position:fixed; top:12px; left:50%; transform:translateX(-50%); height:34px; min-width:120px; background:#000; border-radius:20px; display:flex; align-items:center; justify-content:center; gap:6px; padding:0 14px; transition:all .4s cubic-bezier(.32,1,.23,1); z-index:99; }
.di-pill.exp { min-width:200px; height:38px; }
.di-dot { width:7px; height:7px; border-radius:50%; background:var(--orange); flex-shrink:0; animation: glow 2s ease-in-out infinite; }
@keyframes glow { 0%,100%{opacity:1;box-shadow:0 0 4px var(--orange)} 50%{opacity:.4;box-shadow:none} }
.di-text { font-size:13px; font-weight:600; color:white; white-space:nowrap; }
.di-amt { font-size:13px; font-weight:700; color:var(--orange); white-space:nowrap; }

/* ── TOAST ────────────────────────────────────────────────────────────── */
#toast { position:fixed; top:calc(var(--top)+10px); left:50%; transform:translateX(-50%); background:rgba(10,10,26,.95); backdrop-filter:blur(20px); color:white; padding:10px 20px; border-radius:24px; font-size:14px; font-weight:600; z-index:300; white-space:nowrap; pointer-events:none; border:1px solid rgba(255,255,255,.08); }
#sync-bar { position:fixed; top:calc(var(--top)+10px); left:50%; transform:translateX(-50%); background:var(--orange); color:white; padding:6px 16px; border-radius:20px; font-size:12px; font-weight:700; z-index:200; }

/* ── OVERLAY / MODAL ─────────────────────────────────────────────────── */
#overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(6px); display:flex; align-items:flex-end; justify-content:center; z-index:150; }
.modal { background:var(--card); border-radius:var(--r-xl) var(--r-xl) 0 0; padding:0 24px calc(var(--bot)+32px); width:100%; max-width:430px; animation:slideUp .35s cubic-bezier(.32,1,.23,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px; height:4px; background:var(--bg); border-radius:2px; margin:14px auto 22px; }

/* ── NAV ─────────────────────────────────────────────────────────────── */
nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(242,240,235,0.95);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border-top: 1px solid rgba(10,10,26,.08);
  padding-bottom: calc(var(--bot) + 6px);
  z-index: 100; display: flex;
  /* Hard stop — prevent nav from being cut off */
  padding-bottom: max(calc(var(--bot) + 6px), 20px);
}
.nb {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:10px 0 6px;
  background:none; border:none; cursor:pointer; gap:3px; position:relative;
}
.nb svg { width:24px; height:24px; stroke:var(--t4); transition:stroke .2s; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.nb span { font-size:10px; color:var(--t4); font-weight:500; letter-spacing:.1px; transition:color .2s; }
.nb.on svg { stroke:var(--orange); }
.nb.on span { color:var(--orange); }
.nb.on::after { content:''; position:absolute; bottom:calc(var(--bot)+2px); width:20px; height:3px; background:var(--orange); border-radius:2px 2px 0 0; }
.screen { padding-bottom: calc(var(--bot) + 90px); }

/* ── HERO ────────────────────────────────────────────────────────────── */
.hero {
  background: var(--navy);
  padding: calc(var(--top) + 20px) 24px 36px;
  position: relative; overflow: hidden;
}
/* Subtle radial glow */
.hero::before { content:''; position:absolute; top:-80px; right:-40px; width:280px; height:280px; border-radius:50%; background:radial-gradient(circle, rgba(249,115,22,.15) 0%, transparent 70%); pointer-events:none; }
.hero-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
.hero-logo { width:32px; height:32px; border-radius:9px; overflow:hidden; flex-shrink:0; }
.hero-logo svg { width:100%; height:100%; display:block; }
.hero-appname { font-size:16px; font-weight:800; color:white; letter-spacing:-.3px; margin-left:8px; flex:1; }
.hero-profile {
  display:flex; align-items:center; gap:8px;
  background: rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px; padding:6px 12px 6px 8px;
  cursor:pointer; transition:background .15s;
}
.hero-profile:active { background:rgba(255,255,255,.14); }
.hero-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; }
.hero-pname { font-size:12px; font-weight:600; color:rgba(255,255,255,.65); }
.settings-btn { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.settings-btn:active { background:rgba(255,255,255,.16); }
.settings-btn svg { width:17px; height:17px; stroke:rgba(255,255,255,.55); fill:none; stroke-width:2; stroke-linecap:round; }
.hero-eyebrow { font-size:11px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:10px; }
.hero-amount {
  font-size: 52px; font-weight: 900; color: white;
  letter-spacing: -2.5px; line-height: 1;
  margin-bottom: 8px; position: relative; z-index:1;
}
.hero-amount-eur { font-size:20px; color:rgba(255,255,255,.35); font-weight:500; margin-bottom:28px; letter-spacing:-.3px; }
.hero-date { font-size:12px; color:rgba(255,255,255,.2); letter-spacing:.3px; }
/* Trend badge */
.hero-trend {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:12px; margin-bottom:12px;
  font-size:12px; font-weight:700;
}
.hero-trend.up { background:rgba(5,150,105,.2); color:#34D399; }
.hero-trend.dn { background:rgba(220,38,38,.2); color:#F87171; }

/* ── SECTION ─────────────────────────────────────────────────────────── */
.pad { padding:16px 16px 0; }
.stitle { font-size:12px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px; padding:0 2px; }

/* ── ACCOUNT CARDS ────────────────────────────────────────────────────── */
.acgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ac {
  background:var(--card); border-radius:var(--r-lg);
  padding:18px 16px 20px;
  position:relative; overflow:hidden;
  transition:transform .15s;
}
.ac:active { transform:scale(.97); }
.ac-stripe { position:absolute; top:0; left:0; right:0; height:4px; border-radius:var(--r-lg) var(--r-lg) 0 0; }
.ac-flag { font-size:22px; margin-bottom:12px; display:block; }
.ac-name { font-size:11px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.6px; margin-bottom:6px; }
.ac-amt { font-size:20px; font-weight:800; letter-spacing:-.5px; }
.ac-sub { font-size:11px; color:var(--t4); margin-top:2px; }

/* ── SOLDE MOIS ─────────────────────────────────────────────────────── */
.solde-card {
  background:var(--card); border-radius:var(--r-lg);
  padding:22px 20px 20px; position:relative; overflow:hidden;
}
.solde-card::after { content:''; position:absolute; bottom:-20px; right:-20px; width:120px; height:120px; border-radius:50%; background:rgba(249,115,22,.04); pointer-events:none; }
.solde-lbl { font-size:12px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px; }
.solde-amt { font-size:42px; font-weight:900; letter-spacing:-2px; margin-bottom:20px; line-height:1; }
.solde-amt.pos { color:var(--t1); }
.solde-amt.neg { color:var(--red); }
.pills3 { display:flex; gap:0; border-top:1px solid rgba(10,10,26,.06); padding-top:16px; }
.pill3 { flex:1; }
.pill3:not(:last-child) { border-right:1px solid rgba(10,10,26,.06); }
.pill3-n { font-size:10px; font-weight:700; color:var(--t4); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
.pill3-v { font-size:14px; font-weight:800; }

/* ── CHART ────────────────────────────────────────────────────────────── */
.chart-card { background:var(--card); border-radius:var(--r-lg); padding:18px 16px 14px; }
.chart-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.chart-title { font-size:14px; font-weight:700; color:var(--t1); }
.chart-sub { font-size:12px; color:var(--t3); }
.chart-ch { position:relative; height:110px; }

/* ── OBJECTIVES ─────────────────────────────────────────────────────── */
.obj-card { background:var(--card); border-radius:var(--r-lg); overflow:hidden; }
.obj-row { padding:16px 16px 14px; border-bottom:1px solid rgba(10,10,26,.05); }
.obj-row:last-of-type { border-bottom:none; }
.obj-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.obj-name { font-size:15px; font-weight:600; color:var(--t1); }
.obj-pct { font-size:13px; font-weight:800; color:var(--orange); }
.obj-track { height:5px; background:rgba(10,10,26,.07); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.obj-fill { height:100%; background:linear-gradient(90deg,var(--orange),#FB923C); border-radius:3px; transition:width .8s cubic-bezier(.32,1,.23,1); }
.obj-fill.full { background:linear-gradient(90deg,var(--green),#34D399); }
.obj-bottom { display:flex; justify-content:space-between; align-items:center; }
.obj-amounts { font-size:12px; color:var(--t3); }
.obj-pm { font-size:12px; color:var(--orange); font-weight:700; background:var(--orange-l); padding:2px 8px; border-radius:6px; }
.obj-manage { display:flex; align-items:center; gap:6px; padding:14px 16px; color:var(--orange); font-size:13px; font-weight:700; cursor:pointer; background:none; border:none; width:100%; border-top:1px solid rgba(10,10,26,.05); }

/* ── LIST ────────────────────────────────────────────────────────────── */
.lcard { background:var(--card); border-radius:var(--r-lg); overflow:hidden; }
.lr { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid rgba(10,10,26,.05); }
.lr:last-child { border-bottom:none; }
.lr.tap { cursor:pointer; transition:background .1s; }
.lr.tap:active { background:rgba(10,10,26,.03); }
.lr-icon { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; margin-right:12px; }
.lr-left { flex:1; display:flex; align-items:center; min-width:0; }
.lr-info { flex:1; min-width:0; }
.row-t { font-size:15px; font-weight:500; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-s { font-size:12px; color:var(--t3); margin-top:1px; display:flex; align-items:center; gap:5px; }
.row-a { font-size:15px; font-weight:700; flex-shrink:0; margin-left:10px; }
.row-a.neg { color:var(--red); }
.row-a.pos { color:var(--green); }
.who-badge { font-size:10px; font-weight:700; padding:1px 5px; border-radius:5px; }
.wp { background:#EFF6FF; color:#1D4ED8; }
.wl { background:#F5F3FF; color:#6D28D9; }
.empty { text-align:center; padding:40px 20px; color:var(--t3); font-size:14px; line-height:1.7; }
.empty-icon { font-size:40px; margin-bottom:12px; display:block; }

/* ── CAT COLORS ────────────────────────────────────────────── */
.cat-icon { font-size:16px; }
.cat-food  .lr-icon { background:#FEF3C7; }
.cat-rest  .lr-icon { background:#FCE7F3; }
.cat-trans .lr-icon { background:#E0F2FE; }
.cat-sante .lr-icon { background:#ECFDF5; }
.cat-other .lr-icon { background:#F5F3FF; }

/* ── FORM ────────────────────────────────────────────────────────────── */
.fhdr { background:var(--navy); padding:calc(var(--top)+18px) 22px 22px; }
.fhdr-name { font-size:30px; font-weight:900; color:white; letter-spacing:-1px; }
.fhdr-sub { font-size:14px; color:rgba(255,255,255,.35); margin-top:4px; font-weight:400; letter-spacing:.1px; }
.fbody { padding:18px 16px; }
.fsec { background:var(--card); border-radius:var(--r-lg); overflow:hidden; margin-bottom:14px; }
.frow { display:flex; align-items:center; padding:0 16px; border-bottom:1px solid rgba(10,10,26,.05); min-height:54px; }
.frow:last-child { border-bottom:none; }
.flbl { font-size:15px; color:var(--t2); font-weight:500; flex-shrink:0; min-width:110px; }
.flbl.req::after { content:' ✦'; color:var(--orange); font-size:10px; }
.frow input, .frow select {
  flex:1; border:none; background:none; outline:none;
  font-size:15px; color:var(--t1); text-align:right;
  padding:15px 0; -webkit-appearance:none; appearance:none;
}
.frow input::placeholder { color:var(--t4); }
.finfo { background:rgba(249,115,22,.08); border-radius:var(--r-sm); padding:12px 14px; font-size:13px; color:#9A3412; line-height:1.5; margin-bottom:14px; border-left:3px solid var(--orange); }
.fconv { font-size:13px; color:var(--green); font-weight:700; padding:0 0 10px; display:flex; align-items:center; gap:6px; }
.ferr { background:var(--red-l); color:var(--red); border-radius:var(--r-sm); padding:10px 14px; font-size:13px; margin-bottom:8px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn { width:100%; padding:17px; border-radius:var(--r-md); border:none; background:var(--navy); color:white; font-size:17px; font-weight:700; cursor:pointer; letter-spacing:-.2px; transition:background .15s, transform .1s; }
.btn:active { transform:scale(.98); }
.btn.orange { background:var(--orange); }
.btn.orange:active { background:var(--orange2); }
.btn.ghost { background:none; border:1.5px solid rgba(10,10,26,.12); color:var(--t2); font-size:15px; padding:14px; }
.btn.danger { background:var(--red-l); border:none; color:var(--red); font-size:15px; font-weight:700; padding:14px; }
.btn.sml { padding:10px 16px; width:auto; border-radius:var(--r-sm); font-size:14px; }
.btn-row { display:flex; gap:10px; }

/* ── SEGMENTED ─────────────────────────────────────────────────────── */
.seg-wrap { padding:14px 16px 0; }
.seg { display:flex; background:rgba(10,10,26,.07); border-radius:12px; padding:3px; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.seg::-webkit-scrollbar { display:none; }
.sb { flex:1; flex-shrink:0; padding:9px 12px; border-radius:10px; border:none; background:none; font-size:13px; color:var(--t3); cursor:pointer; font-weight:600; white-space:nowrap; transition:all .2s; }
.sb.on { background:var(--card); color:var(--t1); box-shadow:0 1px 4px rgba(10,10,26,.1); }

/* ── SETTINGS ─────────────────────────────────────────────────────── */
.slbl { font-size:12px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.7px; padding:20px 16px 8px; }
.scard { background:var(--card); border-radius:var(--r-lg); overflow:hidden; margin:0 16px; }
.srow { display:flex; align-items:center; gap:12px; padding:15px 16px; border-bottom:1px solid rgba(10,10,26,.05); }
.srow:last-child { border-bottom:none; }
.srow.tap { cursor:pointer; transition:background .1s; }
.srow.tap:active { background:rgba(10,10,26,.03); }
.s-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.s-main { flex:1; min-width:0; }
.s-title { font-size:15px; font-weight:500; color:var(--t1); }
.s-sub { font-size:12px; color:var(--t3); margin-top:1px; }
.s-val { font-size:15px; color:var(--t3); flex-shrink:0; }
.s-val.green { color:var(--green); font-weight:700; }
.s-val.orange { color:var(--orange); font-weight:700; }
.s-val.purple { color:var(--purple); font-weight:700; }
.chevron { color:var(--t4); font-size:12px; margin-left:4px; }
.stat-grid { display:flex; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB = { apiKey:"AIzaSyBxgpSk3uUNMgT-jWChST836f17RqA_WvY", authDomain:"budget-couple-95b8e.firebaseapp.com", projectId:"budget-couple-95b8e", storageBucket:"budget-couple-95b8e.firebasestorage.app", messagingSenderId:"719726877379", appId:"1:719726877379:web:0c34a2ec32b0c5e66ce076" };
const app = initializeApp(FB);
const db  = getFirestore(app);

// ── DEFAULTS
const DEF_COMPTES = [
  {id:"budget_ca",label:"Budget Canada",devise:"CAD",flag:"🍁"},
  {id:"epargne_ca",label:"Épargne Canada",devise:"CAD",flag:"🍁"},
  {id:"joint_fr",label:"Compte joint FR",devise:"EUR",flag:"🇫🇷"},
  {id:"livret_fr",label:"Livret A",devise:"EUR",flag:"🇫🇷"},
];
const CATS = ["Alimentation","Restaurants","Transport","Santé","Vêtements","Loisirs","Voyages","Sport","Cadeaux","Hygiène","Culture","Divers"];
const FLAGS = ["🍁","🇫🇷","🏦","💶","💵","💴","🏠","💳","📈","🌍","💰","🏧"];
const DEF_FIXES = [{id:1,nom:"Loyer",montant:1500},{id:2,nom:"Téléphones",montant:90},{id:3,nom:"Assurances",montant:100},{id:4,nom:"Abonnements",montant:30},{id:5,nom:"Chat",montant:60}];
const DEF_OBJS = [{id:1,nom:"🏠 Mise de fonds",cible:50000,acc:5000,dt:"2028-06"},{id:2,nom:"✈️ Voyage",cible:5000,acc:1000,dt:"2025-12"},{id:3,nom:"🚗 Voiture",cible:15000,acc:2000,dt:"2027-06"},{id:4,nom:"🛡️ Fonds urgence",cible:10000,acc:3000,dt:"2026-06"}];
const DEF_DATA = {depenses:[],revenus:[],virements:[],fixes:DEF_FIXES,comptes:DEF_COMPTES,ouv:{budget_ca:2100,epargne_ca:15000,joint_fr:2000,livret_fr:8000},taux:1.46,objectifs:[],previsions:{}};

let DATA = JSON.parse(JSON.stringify(DEF_DATA));
let docRef=null, unsub=null, ignoreNext=false;

// ── UTILS
const today = () => new Date().toISOString().slice(0,10);
const fC = n => new Intl.NumberFormat("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Math.round(n));
const fE = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Math.round(n));
const fN = (n,d) => d==="EUR"?fE(n):fC(n);
const cm = () => today().slice(0,7);
const mL = () => new Date().toLocaleString("fr-FR",{month:"long",year:"numeric"});
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let tTimer;
function flash(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hidden");clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.add("hidden"),2200);}
function showSync(msg){const b=document.getElementById("sync-bar");b.textContent=msg;b.classList.remove("hidden");setTimeout(()=>b.classList.add("hidden"),2500);}

let diTimer;
function showDI(text,amt,ms=3000){
  const p=document.getElementById("di-pill");
  document.getElementById("di-text").textContent=text;
  document.getElementById("di-amt").textContent=amt||"";
  p.classList.remove("hidden");
  if(amt)p.classList.add("exp");else p.classList.remove("exp");
  clearTimeout(diTimer);
  diTimer=setTimeout(()=>{p.classList.add("hidden");p.classList.remove("exp");},ms);
}

async function saveData(){
  if(!docRef)return;
  ignoreNext=true;
  try{await setDoc(docRef,DATA);}
  catch(e){flash("Erreur sauvegarde");}
}

function getSoldes(){
  const s={};
  DATA.comptes.forEach(c=>s[c.id]=(DATA.ouv[c.id]||0));
  DATA.revenus.forEach(r=>{if(s[r.compte]!==undefined)s[r.compte]+=parseFloat(r.montantNatif)||0;});
  DATA.virements.forEach(v=>{if(s[v.source]!==undefined)s[v.source]-=parseFloat(v.montant)||0;if(s[v.dest]!==undefined)s[v.dest]+=parseFloat(v.montant)||0;});
  DATA.depenses.forEach(d=>{if(s[d.compte]!==undefined)s[d.compte]-=parseFloat(d.montant)||0;});
  return s;
}

// ── SESSION
const SESSION_MS = 60*60*1000;
const FACEID_KEY = "budget_faceid";
function getAge(){const t=localStorage.getItem("budget_ts");return t?Date.now()-parseInt(t):Infinity;}
function refreshTs(){localStorage.setItem("budget_ts",Date.now().toString());}
function sessionOk(){return getAge()<SESSION_MS;}

// ── PROFILE
const PROFILE_KEY = "budget_profile";
function getProfile(){return localStorage.getItem(PROFILE_KEY)||null;}

// ── CONNECT
async function connect(code){
  docRef=doc(db,"budgets",code);
  const snap=await getDoc(docRef);
  if(snap.exists()) DATA={...JSON.parse(JSON.stringify(DEF_DATA)),...snap.data()};
  else{await setDoc(docRef,DEF_DATA);DATA=JSON.parse(JSON.stringify(DEF_DATA));}
  if(unsub)unsub();
  unsub=onSnapshot(docRef,s=>{
    if(ignoreNext){ignoreNext=false;return;}
    if(s.exists()){DATA={...JSON.parse(JSON.stringify(DEF_DATA)),...s.data()};showSync("Synchro reçue");renderTab(activeTab());}
  });
  localStorage.setItem("budget_code",code);
  document.getElementById("lock-screen").classList.add("hidden");
  document.getElementById("main-nav").classList.remove("hidden");
  showTab("home");
}

function activeTab(){return document.querySelector(".nb.on")?.id?.replace("nb-","")||"home";}

function showLock(msg){
  document.getElementById("lock-screen").classList.remove("hidden");
  document.getElementById("main-nav").classList.add("hidden");
  ["home","depense","argent","historique","previsions","reglages"].forEach(t=>document.getElementById("tab-"+t).classList.add("hidden"));
  document.getElementById("lock-err").classList.add("hidden");
  document.getElementById("lock-loading").classList.add("hidden");
  if(msg){document.getElementById("lock-sub").textContent=msg;}
  const hasFI=localStorage.getItem(FACEID_KEY)&&window.PublicKeyCredential;
  const code=localStorage.getItem("budget_code");
  if(hasFI&&code){
    document.getElementById("lock-sub").textContent=msg||"Vérifiez votre identité";
    document.getElementById("lock-form").classList.add("hidden");
    document.getElementById("lock-loading").classList.add("hidden");
    document.getElementById("faceid-wrap").classList.remove("hidden");
    setTimeout(()=>doFaceID(),400);
  } else {
    document.getElementById("lock-sub").textContent=msg||"Entrez votre code secret";
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("lock-loading").classList.add("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
  }
}

async function doFaceID(){
  const stored=localStorage.getItem(FACEID_KEY);
  if(!stored||!window.PublicKeyCredential)return;
  const{id,code}=JSON.parse(stored);
  try{
    const ch=crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:new Uint8Array(id)}],userVerification:"required",timeout:60000}});
    document.getElementById("lock-loading").classList.remove("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
    await connect(code);refreshTs();
  } catch(e){
    document.getElementById("lock-err").textContent="Face ID annulé — utilisez le code";
    document.getElementById("lock-err").classList.remove("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
  }
}

async function doUnlock(){
  const raw=document.getElementById("lock-code").value.trim();
  if(!raw){document.getElementById("lock-err").textContent="Entrez un code";document.getElementById("lock-err").classList.remove("hidden");return;}
  const code=raw.toLowerCase().replace(/[^a-z0-9\-_]/g,"");
  if(code.length<2){document.getElementById("lock-err").textContent="Code trop court";document.getElementById("lock-err").classList.remove("hidden");return;}
  document.getElementById("lock-err").classList.add("hidden");
  document.getElementById("lock-form").classList.add("hidden");
  document.getElementById("lock-loading").classList.remove("hidden");
  try{
    await connect(code);refreshTs();
    if(window.PublicKeyCredential&&!localStorage.getItem(FACEID_KEY)){
      setTimeout(async()=>{
        try{
          const ch=crypto.getRandomValues(new Uint8Array(32));
          const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"Budget"},user:{id:new TextEncoder().encode(code),name:"budget",displayName:"Budget"},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},timeout:60000}});
          localStorage.setItem(FACEID_KEY,JSON.stringify({id:Array.from(new Uint8Array(cred.rawId)),code}));
          flash("Face ID activé ✓");
        } catch(e){}
      },1200);
    }
  } catch(e){
    document.getElementById("lock-loading").classList.add("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("lock-err").textContent="Erreur: "+(e.code||e.message||"vérifiez internet");
    document.getElementById("lock-err").classList.remove("hidden");
  }
}

document.addEventListener("DOMContentLoaded", function() {
  // Wire lock buttons
  document.getElementById("lock-btn").addEventListener("click", doUnlock);
  document.getElementById("lock-code").addEventListener("keydown", e => { if(e.key==="Enter") doUnlock(); });
  document.getElementById("faceid-btn").addEventListener("click", doFaceID);
  document.getElementById("switch-btn").addEventListener("click", () => {
    document.getElementById("faceid-wrap").classList.add("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
  });

  // Initial load
  const savedCode = localStorage.getItem("budget_code");
  if(savedCode && sessionOk()) {
    document.getElementById("lock-form").classList.add("hidden");
    document.getElementById("lock-sub").textContent = "Connexion en cours...";
    document.getElementById("lock-loading").classList.remove("hidden");
    connect(savedCode).then(() => refreshTs()).catch((e) => {
      console.error("Auto-connect failed:", e);
      localStorage.removeItem("budget_code");
      localStorage.removeItem("budget_ts");
      document.getElementById("lock-loading").classList.add("hidden");
      document.getElementById("lock-form").classList.remove("hidden");
      document.getElementById("lock-sub").textContent = "Entrez votre code secret";
    });
  } else {
    document.getElementById("lock-sub").textContent = "Entrez votre code secret";
    document.getElementById("lock-loading").classList.add("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
  }
});


// ── TABS
function showTab(tab){
  ["home","depense","argent","historique","previsions","reglages"].forEach(t=>{
    const el=document.getElementById("tab-"+t);
    const nb=document.getElementById("nb-"+t);
    if(el)el.classList.toggle("hidden",t!==tab);
    if(nb)nb.classList.toggle("on",t===tab);
  });
  renderTab(tab);
}
window.showTab=showTab;

function renderTab(tab){
  if(tab==="home")       renderHome();
  if(tab==="depense")    renderDepense();
  if(tab==="argent")     renderArgent("rev");
  if(tab==="historique") renderHistorique();

// ── CHART
function renderChart(){
  const soldes=getSoldes();
  const pat=DATA.comptes.reduce((a,c)=>a+(soldes[c.id]||0)*(c.devise==="EUR"?DATA.taux:1),0);
  const cur=cm();
  let snaps=JSON.parse(localStorage.getItem("ps")||"[]");
  const ex=snaps.find(s=>s.m===cur);
  if(!ex)snaps.push({m:cur,v:Math.round(pat)});else ex.v=Math.round(pat);
  if(snaps.length>13)snaps=snaps.slice(-13);
  localStorage.setItem("ps",JSON.stringify(snaps));
  const container=document.getElementById("chart-container");
  if(!container)return;
  if(snaps.length<2){container.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Le graphique apparaît après le 2e mois</div>';return;}
  container.innerHTML='<div class="chart-ch"><canvas id="pc"></canvas></div>';
  setTimeout(()=>{
    const c=document.getElementById("pc");if(!c)return;
    if(window._pc)window._pc.destroy();
    window._pc=new Chart(c,{type:"line",data:{labels:snaps.map(s=>{const[y,mo]=s.m.split("-");return new Date(y,mo-1).toLocaleString("fr-FR",{month:"short"});}),datasets:[{data:snaps.map(s=>s.v),borderColor:"#F97316",borderWidth:2.5,pointBackgroundColor:"#F97316",pointRadius:4,pointHoverRadius:6,tension:0.4,fill:true,backgroundColor:"rgba(249,115,22,0.07)"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`${new Intl.NumberFormat("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(ctx.raw)}`}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#9CA3AF"}},y:{display:false}}}});
  },50);
}

// ── OBJECTIVES render
function renderObjs(){
  const objs=(DATA.objectifs&&DATA.objectifs.length)?DATA.objectifs:DEF_OBJS;
  let h='<div class="obj-card">';
  objs.forEach(o=>{
    const acc=o.acc||0;
    const pct=Math.min(acc/o.cible,1);
    const pd=Math.round(pct*100);
    const full=pd>=100;
    const mo=o.dt?(()=>{const[y,m]=o.dt.split("-").map(Number);const now=new Date();return(y-now.getFullYear())*12+(m-now.getMonth()-1);})():null;
    const pm=(mo&&mo>0)?Math.ceil(Math.max(o.cible-acc,0)/mo):null;
    h+=`<div class="obj-row">
      <div class="obj-top">
        <div class="obj-name">${esc(o.nom)}</div>
        <div class="obj-pct">${full?"✓ "+pd:pd}%</div>
      </div>
      <div class="obj-track"><div class="obj-fill ${full?"full":""}" style="width:${pd}%"></div></div>
      <div class="obj-bottom">
        <div class="obj-amounts">${fC(acc)} <span style="color:var(--t4)">/ ${fC(o.cible)}</span></div>
        ${pm?`<div class="obj-pm">${fC(pm)}/mois</div>`:""}
      </div>
    </div>`;
  });
  h+=`<button class="obj-manage" id="obj-settings-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Gérer les objectifs</button>`;
  return h+'</div>';
}

  });

// ── PREVISIONS
let prevSc="reel";
let prevView="solde"; // solde | patrimoine | epargne | france

function getNextMonths(n){
  const months=[];const now=new Date();
  for(let i=0;i<n;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);months.push({key:d.toISOString().slice(0,7),label:d.toLocaleString("fr-FR",{month:"long",year:"numeric"})});}
  return months;
}

function computeProjection(sc){
  // Returns array of {month, label, solde, patrimoine, epargne, france}
  const months=getNextMonths(3);
  const pd=(DATA.previsions&&DATA.previsions[sc])||{};
  const totFix=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
  const soldes=getSoldes();
  let curPat=DATA.comptes.reduce((a,c)=>a+(soldes[c.id]||0)*(c.devise==="EUR"?DATA.taux:1),0);
  let curEp=soldes["epargne_ca"]||0;
  let curFr=((soldes["joint_fr"]||0)+(soldes["livret_fr"]||0));
  return months.map(({key,label})=>{
    const items=pd[key]||[];
    const revs=items.filter(i=>i.type==="revenu").reduce((a,i)=>a+i.montant,0);
    const deps=items.filter(i=>i.type==="depense").reduce((a,i)=>a+i.montant,0);
    const solde=revs-totFix-deps;
    curPat+=solde;curEp+=solde;
    return {key,label,solde,patrimoine:Math.max(curPat,0),epargne:Math.max(curEp,0),france:curFr*DATA.taux,items,totFix};
  });
}

  }

  if(sec==="taux"){
    h+=`<div class="slbl">Taux de change</div><div class="scard" style="margin:0 16px"><div class="srow"><div class="smain"><div class="stit">EUR → CAD</div><div class="ssub">Modifier lors d'un virement France → Canada</div></div><input id="taux-inp" type="number" step="0.0001" value="${DATA.taux}" style="width:90px;text-align:right;border:none;background:none;font-size:16px;font-weight:700;color:var(--teal);outline:none"></div><div class="srow"><div class="ssub" id="taux-prev">1 EUR = ${Number(DATA.taux).toFixed(4)} CAD</div></div></div>`;
    h+=`<div style="padding:12px 16px 100px"><button class="btn" id="save-taux-btn">Enregistrer le taux</button></div>`;
  }

  if(sec==="profil"){
    const pr=getProfile();
    h+=`<div class="slbl">Identité sur ce téléphone</div>
    <div class="scard" style="margin:0 16px">
      <div class="srow" style="gap:12px;padding:20px 16px">
        <button id="pp-pierre" style="flex:1;padding:20px;border-radius:var(--r-md);border:2px solid ${pr==="Pierre"?"#2563EB":"rgba(10,10,26,.1)"};background:${pr==="Pierre"?"#EFF6FF":"transparent"};color:${pr==="Pierre"?"#1D4ED8":"var(--t3)"};font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.3px;transition:all .15s">Pierre</button>
        <button id="pp-lealin" style="flex:1;padding:20px;border-radius:var(--r-md);border:2px solid ${pr==="Lealin"?"#7C3AED":"rgba(10,10,26,.1)"};background:${pr==="Lealin"?"#F5F3FF":"transparent"};color:${pr==="Lealin"?"#6D28D9":"var(--t3)"};font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.3px;transition:all .15s">Lealin</button>
      </div>
    </div>
    <div class="slbl">Statistiques</div>
    <div class="scard" style="margin:0 16px">
      <div class="stat-row">
        <div class="stat-i"><div class="stat-n">${DATA.depenses.length}</div><div class="stat-l">dépenses</div></div>
        <div class="stat-i"><div class="stat-n">${DATA.revenus.length}</div><div class="stat-l">revenus</div></div>
        <div class="stat-i"><div class="stat-n">${DATA.virements.length}</div><div class="stat-l">virements</div></div>
      </div>
      <div class="stat-row" style="border-top:.5px solid var(--gray2)">
        <div class="stat-i"><div class="stat-n">${(DATA.objectifs&&DATA.objectifs.length)||DEF_OBJS.length}</div><div class="stat-l">objectifs</div></div>
        <div class="stat-i"><div class="stat-n">${DATA.fixes.length}</div><div class="stat-l">postes fixes</div></div>
        <div class="stat-i"><div class="stat-n">${DATA.comptes.length}</div><div class="stat-l">comptes</div></div>
      </div>
    </div>`;
    h+=`<div style="padding:16px 16px 100px"></div>`;
  }

  if(sec==="securite"){
    h+=`<div class="slbl">Changer le code secret</div>
    <div class="scard" style="margin:0 16px">
      <div class="srow"><div class="smain"><div class="stit">Nouveau code</div></div><input id="new-code" type="password" placeholder="Entrez le nouveau code" autocomplete="off" style="width:160px;text-align:right;border:none;background:none;font-size:15px;outline:none;color:var(--text2)"></div>
      <div class="srow"><div class="smain"><div class="stit">Confirmer</div></div><input id="confirm-code" type="password" placeholder="Répétez le code" autocomplete="off" style="width:160px;text-align:right;border:none;background:none;font-size:15px;outline:none;color:var(--text2)"></div>
    </div>
    <div id="code-err" class="ferr hidden" style="margin:8px 16px 0"></div>
    <div style="padding:12px 16px 0"><button class="btn" id="change-code-btn">Changer le code</button></div>
    <div class="slbl" style="margin-top:16px">Face ID</div>
    <div class="scard" style="margin:0 16px">
      <div class="srow"><div class="smain"><div class="stit">Statut Face ID</div><div class="ssub">${localStorage.getItem(FACEID_KEY)?"Activé sur ce téléphone":"Non configuré"}</div></div>
      ${localStorage.getItem(FACEID_KEY)?`<button id="reset-faceid-btn" class="btn ghost sml" style="color:var(--red);border-color:rgba(220,38,38,.3);padding:8px 12px;font-size:13px">Réinitialiser</button>`:`<button id="setup-faceid-btn" class="btn green sml" style="padding:8px 12px;font-size:13px">Configurer</button>`}
      </div>
    </div>
    <div class="slbl" style="margin-top:16px">Session</div>
    <div style="padding:0 16px 100px"><button class="btn ghost" id="logout-btn" style="color:var(--red);border-color:rgba(220,38,38,.3)">Se déconnecter</button></div>`;
  }

  // Show reglages tab
  ["home","depense","argent","historique","previsions"].forEach(t=>{
    document.getElementById("tab-"+t).classList.add("hidden");
    document.getElementById("nb-"+t)?.classList.remove("on");
  });

  el.innerHTML=h;

  // Wire seg buttons
  [["comptes","comptes"],["fixes","fixes"],["objs","objectifs"],["taux","taux"],["profil","profil"],["securite","securite"]].forEach(([id,sec])=>{
    el.querySelector("#rg-"+id)?.addEventListener("click",()=>renderReglages(sec));
  });

  // COMPTES events
  if(sec==="comptes"){
    el.querySelectorAll(".ce-flag-sel").forEach(sel=>sel.addEventListener("change",()=>{const i=parseInt(sel.dataset.idx);DATA.comptes[i].flag=sel.value;const flagDiv=sel.parentElement;flagDiv.childNodes[0].textContent=sel.value;}));
    el.querySelectorAll(".cename").forEach(inp=>inp.addEventListener("input",()=>{DATA.comptes[parseInt(inp.dataset.idx)].label=inp.value;}));
    el.querySelectorAll(".cedev").forEach(sel=>sel.addEventListener("change",()=>{DATA.comptes[parseInt(sel.dataset.idx)].devise=sel.value;}));
    el.querySelectorAll(".ouvinp").forEach(inp=>inp.addEventListener("input",()=>{DATA.ouv[inp.dataset.id]=parseFloat(inp.value)||0;}));
    el.querySelectorAll(".cedel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.delidx);
      if(DATA.comptes.length<=1)return;
      delete DATA.ouv[DATA.comptes[i].id];DATA.comptes.splice(i,1);renderReglages("comptes");
    }));
    el.querySelector("#add-compte-btn").addEventListener("click",()=>showAddCompteForm(el));
    el.querySelector("#save-comptes-btn").addEventListener("click",async()=>{
      await saveData();const b=el.querySelector("#save-comptes-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer les modifications";b.classList.remove("green");},1500);flash("Enregistré ✓");
    });
  }
  // FIXES events
  if(sec==="fixes"){
    el.querySelectorAll(".fixname").forEach(inp=>inp.addEventListener("input",()=>{DATA.fixes[parseInt(inp.dataset.fidx)].nom=inp.value;}));
    el.querySelectorAll(".fixamt").forEach(inp=>inp.addEventListener("input",()=>{DATA.fixes[parseInt(inp.dataset.fidx)].montant=parseFloat(inp.value)||0;const t=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);const tot=el.querySelector("#fix-total");if(tot)tot.innerHTML=`Total : <strong>${fC(t)}</strong>`;}));
    el.querySelectorAll(".fixdel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{DATA.fixes.splice(parseInt(btn.dataset.delidx),1);renderReglages("fixes");}));
    el.querySelector("#add-fix-btn").addEventListener("click",()=>{DATA.fixes.push({id:Date.now(),nom:"",montant:0});renderReglages("fixes");});
    el.querySelector("#save-fixes-btn").addEventListener("click",async()=>{await saveData();const b=el.querySelector("#save-fixes-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer";b.classList.remove("green");},1500);flash("Enregistré ✓");});
  }
  // OBJECTIFS events
  if(sec==="objectifs"){
    const objs=(DATA.objectifs&&DATA.objectifs.length)?DATA.objectifs:JSON.parse(JSON.stringify(DEF_OBJS));
    if(!DATA.objectifs||!DATA.objectifs.length)DATA.objectifs=objs;
    el.querySelectorAll("[data-oidx][data-ofield]").forEach(inp=>inp.addEventListener("input",()=>{const i=parseInt(inp.dataset.oidx);const f=inp.dataset.ofield;DATA.objectifs[i][f]=f==="nom"||f==="dt"?inp.value:parseFloat(inp.value)||0;}));
    el.querySelectorAll(".cedel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{DATA.objectifs.splice(parseInt(btn.dataset.delidx),1);renderReglages("objectifs");}));
    el.querySelector("#add-obj-btn").addEventListener("click",()=>{if(!DATA.objectifs||!DATA.objectifs.length)DATA.objectifs=JSON.parse(JSON.stringify(DEF_OBJS));DATA.objectifs.push({id:Date.now(),nom:"Nouvel objectif",cible:10000,acc:0,dt:""});renderReglages("objectifs");});
    el.querySelector("#save-objs-btn").addEventListener("click",async()=>{
      await saveData();
      const b=el.querySelector("#save-objs-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer";b.classList.remove("green");},1500);
      flash("Objectifs enregistrés ✓");
      DATA.objectifs.forEach(o=>{if((o.acc||0)>=o.cible&&o.cible>0)setTimeout(()=>flash("🎉 "+o.nom+" atteint !"),600);});
    });
  }
  // TAUX events
  if(sec==="taux"){
    el.querySelector("#taux-inp").addEventListener("input",()=>{const v=parseFloat(el.querySelector("#taux-inp").value)||DATA.taux;el.querySelector("#taux-prev").textContent=`1 EUR = ${v.toFixed(4)} CAD`;});
    el.querySelector("#save-taux-btn").addEventListener("click",async()=>{DATA.taux=parseFloat(el.querySelector("#taux-inp").value)||DATA.taux;await saveData();flash("Taux mis à jour ✓");});
  }
  // PROFIL events
  if(sec==="profil"){
    el.querySelector("#pp-pierre")?.addEventListener("click",()=>{localStorage.setItem(PROFILE_KEY,"Pierre");flash("Profil : Pierre ✓");renderReglages("profil");});
    el.querySelector("#pp-lealin")?.addEventListener("click",()=>{localStorage.setItem(PROFILE_KEY,"Lealin");flash("Profil : Lealin ✓");renderReglages("profil");});
  }
  // SECURITE events
  if(sec==="securite"){
    el.querySelector("#change-code-btn")?.addEventListener("click",async()=>{
      const nc=el.querySelector("#new-code").value.trim().toLowerCase().replace(/[^a-z0-9\-_]/g,"");
      const cc=el.querySelector("#confirm-code").value.trim().toLowerCase().replace(/[^a-z0-9\-_]/g,"");
      const errEl=el.querySelector("#code-err");
      if(nc.length<2){errEl.textContent="Code trop court (min 2 caractères)";errEl.classList.remove("hidden");return;}
      if(nc!==cc){errEl.textContent="Les codes ne correspondent pas";errEl.classList.remove("hidden");return;}
      errEl.classList.add("hidden");
      // Copy data to new code
      const newRef=doc(db,"budgets",nc);
      try{
        await setDoc(newRef,DATA);
        localStorage.setItem("budget_code",nc);
        docRef=newRef;
        if(unsub)unsub();
        unsub=onSnapshot(docRef,s=>{if(ignoreNext){ignoreNext=false;return;}if(s.exists()){DATA={...JSON.parse(JSON.stringify(DEF_DATA)),...s.data()};showSync("Synchro reçue");renderTab(activeTab());}});
        flash("Code changé ✓ — partagez le nouveau code avec Lealin");
        el.querySelector("#new-code").value="";
        el.querySelector("#confirm-code").value="";
      } catch(e){errEl.textContent="Erreur: "+e.message;errEl.classList.remove("hidden");}
    });
    el.querySelector("#logout-btn")?.addEventListener("click",()=>{localStorage.removeItem("budget_code");localStorage.removeItem("budget_ts");if(unsub)unsub();showLock(null);});
    el.querySelector("#reset-faceid-btn")?.addEventListener("click",()=>{localStorage.removeItem(FACEID_KEY);flash("Face ID réinitialisé");renderReglages("securite");});
    el.querySelector("#setup-faceid-btn")?.addEventListener("click",async()=>{
      const code=localStorage.getItem("budget_code")||"0318";
      try{
        const ch=crypto.getRandomValues(new Uint8Array(32));
        const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"Budget"},user:{id:new TextEncoder().encode(code),name:"budget",displayName:"Budget"},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},timeout:60000}});
        localStorage.setItem(FACEID_KEY,JSON.stringify({id:Array.from(new Uint8Array(cred.rawId)),code}));
        flash("Face ID activé ✓");renderReglages("securite");
      }catch(e){flash("Face ID annulé ou non disponible");}
    });
  }
}
window.renderReglages=renderReglages;

function showAddCompteForm(el){
  const area=el.querySelector("#add-compte-area");
  const flagOpts=FLAGS.map(f=>`<option value="${f}">${f}</option>`).join("");
  area.innerHTML=`<div class="addbox"><div class="addtitle">Nouveau compte</div><div class="addinputs"><select id="nc-flag">${flagOpts}</select><input type="text" id="nc-label" placeholder="Nom"><select id="nc-devise"><option value="CAD">CAD</option><option value="EUR">EUR</option><option value="USD">USD</option></select></div><div class="btn-row"><button class="btn ghost sml" id="nc-cancel">Annuler</button><button class="btn green sml" id="nc-confirm">Ajouter</button></div></div>`;
  area.querySelector("#nc-cancel").addEventListener("click",()=>renderReglages("comptes"));
  area.querySelector("#nc-confirm").addEventListener("click",()=>{
    const label=area.querySelector("#nc-label").value.trim();
    if(!label)return;
    const id="c_"+Date.now();
    DATA.comptes.push({id,label,devise:area.querySelector("#nc-devise").value,flag:area.querySelector("#nc-flag").value});
    DATA.ouv[id]=0;
    renderReglages("comptes");flash("Compte ajouté ✓");
  });
}
</script>
</body>
</html>
