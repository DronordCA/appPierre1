<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0F1E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Budget Couple</title>
<style>
:root {
  --top: env(safe-area-inset-top, 54px);
  --bot: env(safe-area-inset-bottom, 20px);
  --left: env(safe-area-inset-left, 0px);
  --right: env(safe-area-inset-right, 0px);
  --navy:    #0A0F1E;
  --navy2:   #111827;
  --navy3:   #1C2639;
  --teal:    #0EA47A;
  --teal2:   #0C8F6B;
  --teal-l:  rgba(14,164,122,0.12);
  --blue:    #2563EB;
  --blue-l:  rgba(37,99,235,0.1);
  --amber:   #D97706;
  --amber-l: rgba(217,119,6,0.1);
  --red:     #DC2626;
  --red-l:   rgba(220,38,38,0.1);
  --white:   #FFFFFF;
  --gray1:   #F9FAFB;
  --gray2:   #F3F4F6;
  --gray3:   #E5E7EB;
  --gray4:   #9CA3AF;
  --gray5:   #6B7280;
  --text1:   #111827;
  --text2:   #374151;
  --text3:   #6B7280;
  --card-r:  18px;
  --small-r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--navy); }
body {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', sans-serif;
  background: var(--gray1);
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  overflow-x: hidden;
}
input, select, button, textarea { font-family: inherit; }
.hidden { display: none !important; }

/* ── LOCK SCREEN ── */
#lock-screen {
  position: fixed; inset: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  padding: calc(var(--top) + 20px) 32px calc(var(--bot) + 20px);
}
.lock-island-space { height: calc(var(--top) + 16px); }
.lock-icon {
  width: 76px; height: 76px; border-radius: 24px;
  background: linear-gradient(135deg, var(--teal), #0891B2);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 28px;
}
.lock-title {
  font-size: 30px; font-weight: 700; color: var(--white);
  letter-spacing: -0.8px; margin-bottom: 8px;
}
.lock-sub {
  font-size: 15px; color: rgba(255,255,255,.45);
  text-align: center; line-height: 1.5; margin-bottom: 40px;
}
.lock-connecting {
  display: flex; align-items: center; gap: 10px;
  color: var(--teal); font-size: 14px; font-weight: 500;
}
.spin { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#lock-err { color: #F87171; font-size: 13px; margin-top: 12px; text-align: center; }

/* ── NAV ── */
nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 0.5px solid rgba(0,0,0,.1);
  padding-bottom: calc(var(--bot) + 8px);
  z-index: 100;
  display: flex;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 0 6px; background: none; border: none; cursor: pointer; gap: 3px;
}
.nav-icon { width: 24px; height: 24px; position: relative; }
.nav-icon svg { width: 24px; height: 24px; stroke: var(--gray4); transition: stroke .2s; }
.nav-btn.active .nav-icon svg { stroke: var(--teal); }
.nav-lbl { font-size: 10px; color: var(--gray4); font-weight: 500; letter-spacing: .2px; transition: color .2s; }
.nav-btn.active .nav-lbl { color: var(--teal); }

/* ── SCREEN ── */
.screen { padding-bottom: calc(var(--bot) + 90px); min-height: 100dvh; }

/* ── SYNC BAR ── */
#sync-bar {
  position: fixed; top: calc(var(--top) + 8px); left: 50%; transform: translateX(-50%);
  background: var(--teal); color: white;
  padding: 6px 16px; border-radius: 20px;
  font-size: 12px; font-weight: 600; z-index: 200;
  transition: opacity .3s;
}

/* ── TOAST ── */
#toast {
  position: fixed; top: calc(var(--top) + 8px); left: 50%; transform: translateX(-50%);
  background: rgba(17,24,39,.95);
  backdrop-filter: blur(10px);
  color: white; padding: 10px 20px; border-radius: 20px;
  font-size: 14px; font-weight: 600; z-index: 300;
  white-space: nowrap; pointer-events: none;
}

/* ── OVERLAY / MODAL ── */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 150;
}
.modal {
  background: white; border-radius: 28px 28px 0 0;
  padding: 8px 24px calc(var(--bot) + 28px);
  width: 100%; max-width: 430px;
  animation: slideUp .3s cubic-bezier(.32,1,.23,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--gray3); border-radius: 2px; margin: 12px auto 20px; }
.modal-title { font-size: 20px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
.modal-amt { font-size: 34px; font-weight: 800; color: var(--red); letter-spacing: -1px; margin-bottom: 8px; }
.modal-meta { font-size: 14px; color: var(--text3); margin-bottom: 2px; }
.modal-btns { display: flex; gap: 10px; margin-top: 24px; }

/* ── HERO ── */
.hero {
  background: var(--navy);
  padding: calc(var(--top) + 20px) 24px 32px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(14,164,122,.08);
}
.hero::after {
  content: '';
  position: absolute; bottom: -40px; left: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(37,99,235,.06);
}
.hero-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: rgba(255,255,255,.35);
  margin-bottom: 8px;
}
.hero-amt {
  font-size: 46px; font-weight: 800; color: white;
  letter-spacing: -2px; line-height: 1;
  margin-bottom: 6px; position: relative; z-index: 1;
}
.hero-sub { font-size: 17px; color: rgba(255,255,255,.4); font-weight: 500; margin-bottom: 24px; }
.hero-date { font-size: 12px; color: rgba(255,255,255,.25); }
.hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(14,164,122,.15); color: var(--teal);
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  margin-bottom: 6px;
}
.hero-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── SECTIONS ── */
.page-pad { padding: 16px 16px 0; }
.section-title {
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 10px; padding: 0 2px;
}

/* ── ACCOUNT CARDS ── */
.accounts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.account-card {
  background: white; border-radius: var(--card-r);
  padding: 16px; position: relative; overflow: hidden;
}
.account-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--card-r) var(--card-r) 0 0;
}
.account-card.cad::after { background: linear-gradient(90deg, var(--teal), #0891B2); }
.account-card.eur::after { background: linear-gradient(90deg, var(--amber), #F59E0B); }
.ac-flag { font-size: 20px; margin-bottom: 10px; }
.ac-name { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 6px; line-height: 1.2; }
.ac-amount { font-size: 18px; font-weight: 800; }
.ac-amount.cad { color: var(--teal); }
.ac-amount.eur { color: var(--amber); }

/* ── SOLDE MOIS ── */
.solde-card {
  background: white; border-radius: var(--card-r);
  padding: 20px;
}
.solde-card.neg { background: #FFF5F5; }
.solde-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.solde-amount { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 16px; }
.solde-amount.pos { color: var(--text1); }
.solde-amount.neg { color: var(--red); }
.pills { display: flex; gap: 8px; padding-top: 16px; border-top: 1px solid var(--gray3); }
.pill { flex: 1; }
.pill-name { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.pill-val { font-size: 13px; font-weight: 700; padding: 4px 8px; border-radius: 8px; display: inline-block; }
.pill-teal  { color: var(--teal);  background: var(--teal-l); }
.pill-blue  { color: var(--blue);  background: var(--blue-l); }
.pill-amber { color: var(--amber); background: var(--amber-l); }

/* ── LIST CARDS ── */
.list-card { background: white; border-radius: var(--card-r); overflow: hidden; }
.list-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 16px; border-bottom: .5px solid var(--gray2);
}
.list-row:last-child { border-bottom: none; }
.list-row.tap { cursor: pointer; }
.list-row.tap:active { background: var(--gray2); }
.row-left { flex: 1; min-width: 0; }
.row-title { font-size: 15px; font-weight: 500; color: var(--text1); }
.row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.row-amt { font-size: 15px; font-weight: 700; color: var(--red); flex-shrink: 0; margin-left: 12px; }
.row-amt-green { color: var(--teal); }
.cat-row-amt { font-size: 14px; font-weight: 700; color: var(--amber); }
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-size: 14px; line-height: 1.6;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ── FORM HEADER ── */
.form-hdr {
  background: var(--navy);
  padding: calc(var(--top) + 16px) 20px 20px;
  font-size: 28px; font-weight: 800; color: white;
  letter-spacing: -0.8px;
}
.form-hdr-sub { font-size: 14px; color: rgba(255,255,255,.4); margin-top: 4px; font-weight: 400; }

/* ── FORM ── */
.form-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }
.form-section {
  background: white; border-radius: var(--card-r);
  overflow: hidden; margin-bottom: 16px;
}
.form-row {
  display: flex; align-items: center;
  padding: 0 16px; border-bottom: .5px solid var(--gray2);
  min-height: 52px;
}
.form-row:last-child { border-bottom: none; }
.form-row-label {
  font-size: 15px; color: var(--text1); font-weight: 500;
  flex-shrink: 0; width: 110px;
}
.form-row-label.req::after { content: ' *'; color: var(--teal); }
.form-row input, .form-row select {
  flex: 1; border: none; background: none; outline: none;
  font-size: 15px; color: var(--text2);
  text-align: right; padding: 14px 0;
  -webkit-appearance: none; appearance: none;
}
.form-row input::placeholder { color: var(--gray4); }
.form-row select { color: var(--text2); }
.form-row-full { flex-direction: column; align-items: flex-start; padding: 14px 16px; }
.form-row-full .form-row-label { margin-bottom: 8px; width: auto; }
.form-row-full input, .form-row-full select {
  width: 100%; text-align: left; padding: 0; font-size: 15px;
}
.form-info {
  background: rgba(14,164,122,.08); border-radius: var(--small-r);
  padding: 12px 14px; font-size: 13px; color: var(--teal2);
  line-height: 1.5; margin-bottom: 16px;
}
.conv-preview { font-size: 13px; color: var(--teal); font-weight: 600; padding: 4px 0 8px; }
.form-err {
  background: var(--red-l); color: var(--red);
  border-radius: var(--small-r); padding: 10px 14px;
  font-size: 13px; margin-bottom: 8px;
}

/* ── BUTTONS ── */
.btn-primary {
  width: 100%; padding: 16px;
  border-radius: 14px; border: none;
  background: var(--navy); color: white;
  font-size: 17px; font-weight: 700; cursor: pointer;
  letter-spacing: -.2px; transition: background .2s;
}
.btn-primary:active { background: var(--navy3); }
.btn-primary.green { background: var(--teal); }
.btn-primary.green:active { background: var(--teal2); }
.btn-ghost {
  flex: 1; padding: 14px;
  border-radius: 12px; border: 1.5px solid var(--gray3);
  background: none; color: var(--text2);
  font-size: 15px; cursor: pointer;
}
.btn-destruct {
  flex: 1; padding: 14px;
  border-radius: 12px; border: none;
  background: var(--red-l); color: var(--red);
  font-size: 15px; font-weight: 600; cursor: pointer;
}

/* ── SEGMENTED ── */
.seg-wrap { padding: 12px 16px 0; }
.seg {
  display: flex; background: var(--gray2);
  border-radius: 10px; padding: 3px; gap: 2px;
}
.seg-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px;
  border: none; background: none;
  font-size: 14px; color: var(--text3); cursor: pointer; font-weight: 500;
  transition: all .2s;
}
.seg-btn.active {
  background: white; color: var(--text1); font-weight: 700;
  box-shadow: 0 1px 3px rgba(0,0,0,.12);
}

/* ── SETTINGS ROWS ── */
.settings-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .5px;
  padding: 20px 16px 8px;
}
.settings-card { background: white; border-radius: var(--card-r); overflow: hidden; margin: 0 16px; }
.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: .5px solid var(--gray2);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.settings-row-main { flex: 1; min-width: 0; }
.settings-row-title { font-size: 15px; font-weight: 500; color: var(--text1); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.settings-row-value { font-size: 15px; color: var(--text3); flex-shrink: 0; }
.settings-row-value.green { color: var(--teal); font-weight: 600; }
.settings-row-value.amber { color: var(--amber); font-weight: 600; }
.stat-row { display: flex; }
.stat-item { flex: 1; text-align: center; padding: 16px 0; }
.stat-num { font-size: 24px; font-weight: 800; color: var(--text1); }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── COMPTE EDIT ── */
.compte-edit-card {
  background: white; border-radius: var(--card-r);
  overflow: hidden; margin: 0 16px 10px;
}
.compte-edit-row {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px; border-bottom: .5px solid var(--gray2);
}
.compte-edit-flag {
  font-size: 22px; width: 38px; height: 38px;
  border-radius: 10px; background: var(--gray2);
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; flex-shrink: 0;
}
.compte-edit-flag select {
  position: absolute; opacity: 0; width: 38px; height: 38px;
}
.ce-name-input {
  flex: 1; border: none; background: none; outline: none;
  font-size: 15px; font-weight: 500; color: var(--text1);
  padding: 8px 0;
}
.ce-devise {
  border: none; background: var(--gray2); border-radius: 8px;
  padding: 6px 10px; font-size: 13px; font-weight: 600;
  color: var(--text2); flex-shrink: 0;
  -webkit-appearance: none; appearance: none;
}
.ce-del {
  width: 30px; height: 30px; border-radius: 8px;
  border: none; background: var(--red-l); color: var(--red);
  font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.ce-ouv-row {
  display: flex; align-items: center; padding: 10px 14px;
  gap: 10px;
}
.ce-ouv-lbl { font-size: 13px; color: var(--text3); flex-shrink: 0; }
.ce-ouv-input {
  flex: 1; border: none; background: none; outline: none;
  font-size: 15px; font-weight: 600; color: var(--teal);
  text-align: right; padding: 6px 0;
}

/* ── ADD COMPTE ── */
.add-compte-box {
  background: rgba(14,164,122,.06); border-radius: var(--card-r);
  padding: 16px; margin: 0 16px;
}
.add-compte-title { font-size: 13px; font-weight: 700; color: var(--teal); margin-bottom: 12px; }
.add-compte-inputs { display: flex; gap: 8px; margin-bottom: 12px; }
.add-compte-inputs input {
  flex: 1; padding: 10px 12px; border-radius: 10px;
  border: 1.5px solid var(--gray3); background: white;
  font-size: 14px; color: var(--text1); outline: none;
}
.add-compte-inputs input:focus { border-color: var(--teal); }
.add-compte-inputs select {
  padding: 10px 12px; border-radius: 10px;
  border: 1.5px solid var(--gray3); background: white;
  font-size: 13px; color: var(--text2); width: 70px;
  -webkit-appearance: none; appearance: none; outline: none;
}
.add-compte-btns { display: flex; gap: 8px; }

/* ── FIX ROWS ── */
.fix-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: .5px solid var(--gray2);
}
.fix-row:last-of-type { border-bottom: none; }
.fix-name {
  flex: 1; border: none; background: none; outline: none;
  font-size: 15px; color: var(--text1); padding: 4px 0;
}
.fix-amt {
  width: 90px; border: none; background: none; outline: none;
  font-size: 15px; font-weight: 600; color: var(--teal);
  text-align: right; padding: 4px 0;
}
.fix-del {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: var(--red-l); color: var(--red);
  font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.fix-total {
  padding: 14px 16px; font-size: 14px; color: var(--text3);
  border-top: .5px solid var(--gray2);
}
.fix-total strong { color: var(--text1); }

/* ── ARROW ── */
.arrow-separator {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 0; color: var(--gray4);
}
.arrow-separator svg { width: 20px; height: 20px; }

/* ── LOGOUT ── */
.logout-btn {
  width: calc(100% - 32px); margin: 0 16px;
  padding: 14px; border-radius: 14px;
  border: 1.5px solid rgba(220,38,38,.2);
  background: none; color: var(--red);
  font-size: 15px; font-weight: 600; cursor: pointer;
}

/* ── DYNAMIC ISLAND INTEGRATION ── */
.di-bar {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  height: calc(var(--top) + 2px);
  background: var(--navy);
  z-index: 98;
  pointer-events: none;
}
.di-pill {
  position: absolute;
  top: 12px; left: 50%; transform: translateX(-50%);
  height: 34px; min-width: 120px;
  background: #000;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 14px;
  transition: all .4s cubic-bezier(.32,1,.23,1);
  z-index: 99;
}
.di-pill.expanded {
  min-width: 200px; height: 38px;
}
.di-pill-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--teal);
  animation: pulse 2s infinite;
  flex-shrink: 0;
}
.di-pill-text {
  font-size: 13px; font-weight: 600; color: white;
  white-space: nowrap; letter-spacing: -.1px;
}
.di-pill-amt {
  font-size: 13px; font-weight: 700; color: var(--teal);
  white-space: nowrap;
}

</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-island-space"></div>
  <div class="lock-icon">💰</div>
  <div class="lock-title">Budget</div>
  <div class="lock-sub">Connexion en cours...</div>
  <div class="lock-connecting">
    <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.2-8.6"/></svg>
    Chargement de vos données
  </div>
  <div id="lock-err" class="hidden"></div>
</div>

<div id="toast" class="hidden"></div>
<div id="sync-bar" class="hidden"></div>
<div id="overlay" class="overlay hidden"></div>

<!-- NAV -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxgpSk3uUNMgT-jWChST836f17RqA_WvY",
  authDomain: "budget-couple-95b8e.firebaseapp.com",
  projectId: "budget-couple-95b8e",
  storageBucket: "budget-couple-95b8e.firebasestorage.app",
  messagingSenderId: "719726877379",
  appId: "1:719726877379:web:0c34a2ec32b0c5e66ce076"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const DEFAULT_COMPTES = [
  {id:"budget_ca", label:"Budget Canada",   devise:"CAD", flag:"🍁"},
  {id:"epargne_ca",label:"Épargne Canada",  devise:"CAD", flag:"🍁"},
  {id:"joint_fr",  label:"Compte joint FR", devise:"EUR", flag:"🇫🇷"},
  {id:"livret_fr", label:"Livret A",        devise:"EUR", flag:"🇫🇷"},
];
const CATS  = ["Alimentation","Restaurants","Transport","Santé","Vêtements","Loisirs","Voyages","Sport","Cadeaux","Hygiène","Culture","Divers"];
const FLAGS = ["🍁","🇫🇷","🏦","💶","💵","💴","🏠","💳","📈","🌍","💰","🏧"];
const DEFAULT_FIXES = [
  {id:1,nom:"Loyer / Hypothèque",montant:1500},
  {id:2,nom:"Téléphones",montant:90},
  {id:3,nom:"Assurances",montant:100},
  {id:4,nom:"Abonnements",montant:30},
  {id:5,nom:"Chat",montant:60},
];
const DEFAULT_DATA = {
  depenses:[], revenus:[], virements:[],
  fixes: DEFAULT_FIXES, comptes: DEFAULT_COMPTES,
  ouv: {budget_ca:2100,epargne_ca:15000,joint_fr:2000,livret_fr:8000},
  taux: 1.46,
};

let DATA = structuredClone(DEFAULT_DATA);
let docRef = null;
let unsubscribe = null;
let ignoreNext = false;

const today    = () => new Date().toISOString().slice(0,10);
const fmtCAD   = n => new Intl.NumberFormat("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Math.round(n));
const fmtEUR   = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Math.round(n));
const fmtNum   = (n,d) => d==="EUR"?fmtEUR(n):fmtCAD(n);
const curMonth = () => today().slice(0,7);
const moisLbl  = () => new Date().toLocaleString("fr-FR",{month:"long",year:"numeric"});
const esc      = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let toastTimer;
function flash(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.remove("hidden");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.add("hidden"),2200);
}
function showSync(msg) {
  const b=document.getElementById("sync-bar");
  b.textContent=msg; b.classList.remove("hidden");
  setTimeout(()=>b.classList.add("hidden"),2500);
}

async function saveData() {
  if (!docRef) return;
  ignoreNext = true;
  try { await setDoc(docRef, DATA); }
  catch(e) { flash("Erreur de sauvegarde ⚠️"); }
}

function getSoldes() {
  const s={};
  DATA.comptes.forEach(c=>s[c.id]=(DATA.ouv[c.id]||0));
  DATA.revenus.forEach(r=>{if(s[r.compte]!==undefined)s[r.compte]+=parseFloat(r.montantNatif)||0;});
  DATA.virements.forEach(v=>{
    if(s[v.source]!==undefined)s[v.source]-=parseFloat(v.montant)||0;
    if(s[v.dest]!==undefined)s[v.dest]+=parseFloat(v.montant)||0;
  });
  DATA.depenses.forEach(d=>{if(s[d.compte]!==undefined)s[d.compte]-=parseFloat(d.montant)||0;});
  return s;
}


// ── DYNAMIC ISLAND ANIMATION
function showDIPill(text, amt, duration=3000) {
  const pill = document.getElementById("di-pill");
  const diText = document.getElementById("di-text");
  const diAmt = document.getElementById("di-amt");
  diText.textContent = text;
  diAmt.textContent = amt || "";
  pill.classList.remove("hidden");
  if(amt) pill.classList.add("expanded");
  else pill.classList.remove("expanded");
  clearTimeout(window._diTimer);
  window._diTimer = setTimeout(() => {
    pill.classList.add("hidden");
    pill.classList.remove("expanded");
  }, duration);
}

// ── AUTO CONNECT
async function connect(code) {
  docRef = doc(db, "budgets", code);
  try {
    const snap = await getDoc(docRef);
    if(snap.exists()) DATA = {...DEFAULT_DATA, ...snap.data()};
    else { await setDoc(docRef, DEFAULT_DATA); DATA = structuredClone(DEFAULT_DATA); }
    if(unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(docRef, snap => {
      if(ignoreNext){ ignoreNext=false; return; }
      if(snap.exists()){
        DATA = {...DEFAULT_DATA, ...snap.data()};
        showSync("🔄 Mise à jour reçue"); showDIPill("Synchro", null, 2000);
        const active=document.querySelector(".nav-btn.active")?.id?.replace("nav-","");
        if(active) renderTab(active);
      }
    });
    document.getElementById("lock-screen").classList.add("hidden");
    document.getElementById("main-nav").classList.remove("hidden");
    localStorage.setItem("budget_code", code);
    showTab("home");
  } catch(e) {
    document.getElementById("lock-err").textContent="Erreur de connexion. Vérifiez internet.";
    document.getElementById("lock-err").classList.remove("hidden");
  }
}

// Auto-connect with code 0318
connect("0318");

window.showTab = function(tab) {
  ["home","depense","argent","reglages"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("hidden",t!==tab);
    document.getElementById("nav-"+t).classList.toggle("active",t===tab);
  });
  renderTab(tab);
};

function renderTab(tab) {
  if(tab==="home")     renderHome();
  if(tab==="depense")  renderDepense();
  if(tab==="argent")   renderArgent("rev");
  if(tab==="reglages") renderReglages("comptes");
}

// ── HOME
function renderHome() {
  const soldes=getSoldes();
  const cm=curMonth();
  const depMois=DATA.depenses.filter(d=>d.date?.startsWith(cm));
  const budId=DATA.comptes.find(c=>c.id==="budget_ca")?.id||DATA.comptes[0]?.id;
  const virMoisBudget=DATA.virements.filter(v=>v.dest===budId&&v.date?.startsWith(cm)).reduce((a,v)=>a+(parseFloat(v.montant)||0),0);
  const totalFixes=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
  const depBudgetMois=depMois.filter(d=>d.compte===budId).reduce((a,d)=>a+(parseFloat(d.montant)||0),0);
  const soldeMois=virMoisBudget-totalFixes-depBudgetMois;
  const patrimoineCAD=DATA.comptes.reduce((a,c)=>a+(soldes[c.id]||0)*(c.devise==="EUR"?DATA.taux:1),0);
  const catTotals={};
  depMois.forEach(d=>{if(d.cat)catTotals[d.cat]=(catTotals[d.cat]||0)+(parseFloat(d.montant)||0);});
  const cats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);

  let html=`
  <div class="hero">
    <div class="hero-eyebrow">Patrimoine total</div>
    <div class="hero-amt">${fmtCAD(patrimoineCAD)}</div>
    <div class="hero-sub">${fmtEUR(patrimoineCAD/DATA.taux)}</div>
    <div class="hero-date">${moisLbl()}</div>
  </div>

  <div class="page-pad">
    <div class="section-title">Vos comptes</div>
    <div class="accounts-grid">
      ${DATA.comptes.map(c=>`
        <div class="account-card ${c.devise==="EUR"?"eur":"cad"}">
          <div class="ac-flag">${esc(c.flag||"🏦")}</div>
          <div class="ac-name">${esc(c.label)}</div>
          <div class="ac-amount ${c.devise==="EUR"?"eur":"cad"}">${fmtNum(soldes[c.id]||0,c.devise)}</div>
        </div>`).join("")}
    </div>
  </div>

  <div class="page-pad">
    <div class="section-title">Ce mois</div>
    <div class="solde-card ${soldeMois<0?"neg":""}">
      <div class="solde-label">Solde disponible</div>
      <div class="solde-amount ${soldeMois<0?"neg":"pos"}">${fmtCAD(soldeMois)}</div>
      <div class="pills">
        <div class="pill">
          <div class="pill-name">Reçus</div>
          <div class="pill-val pill-teal">${fmtCAD(virMoisBudget)}</div>
        </div>
        <div class="pill">
          <div class="pill-name">Fixes</div>
          <div class="pill-val pill-blue">${fmtCAD(totalFixes)}</div>
        </div>
        <div class="pill">
          <div class="pill-name">Variables</div>
          <div class="pill-val pill-amber">${fmtCAD(depBudgetMois)}</div>
        </div>
      </div>
    </div>
  </div>`;

  if(cats.length>0) html+=`
  <div class="page-pad">
    <div class="section-title">Par catégorie</div>
    <div class="list-card">
      ${cats.map(([cat,total])=>`
        <div class="list-row">
          <div class="row-left"><div class="row-title">${esc(cat)}</div></div>
          <div class="cat-row-amt">${fmtCAD(total)}</div>
        </div>`).join("")}
    </div>
  </div>`;

  html+=`<div class="page-pad">
    <div class="section-title">Dernières dépenses</div>`;

  if(depMois.length>0) html+=`
    <div class="list-card">
      ${depMois.slice(0,8).map(d=>`
        <div class="list-row tap" onclick='openDepDetail("${d.id}")'>
          <div class="row-left">
            <div class="row-title">${esc(d.desc)}</div>
            <div class="row-sub">${esc(d.cat||"—")}  ·  ${esc(d.date)}</div>
          </div>
          <div class="row-amt">${fmtCAD(d.montant)}</div>
        </div>`).join("")}
    </div>`;
  else html+=`
    <div class="list-card">
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        Aucune dépense ce mois<br>Appuyez sur + pour commencer
      </div>
    </div>`;

  html+=`</div>`;
  document.getElementById("tab-home").innerHTML=html;
  // Show patrimoine in DI pill briefly on home load
  setTimeout(()=>showDIPill(moisLbl(), fmtCAD(patrimoineCAD), 4000), 200);
}

window.openDepDetail=function(id){
  const dep=DATA.depenses.find(d=>String(d.id)===String(id));
  if(!dep)return;
  const c=DATA.comptes.find(x=>x.id===dep.compte);
  const o=document.getElementById("overlay");
  o.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">${esc(dep.desc)}</div>
    <div class="modal-amt">${fmtCAD(dep.montant)}</div>
    <div class="modal-meta">${esc(dep.cat||"—")}  ·  ${esc(dep.date)}</div>
    <div class="modal-meta">${c?esc((c.flag||"🏦")+" "+c.label):esc(dep.compte)}</div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">Fermer</button>
      <button class="btn-destruct" onclick="deleteDep('${id}')">Supprimer</button>
    </div>
  </div>`;
  o.classList.remove("hidden");
  o.onclick=closeModal;
};
window.closeModal=()=>document.getElementById("overlay").classList.add("hidden");
window.deleteDep=async function(id){
  DATA.depenses=DATA.depenses.filter(d=>String(d.id)!==String(id));
  await saveData(); closeModal(); flash("Dépense supprimée"); renderHome();
};

// ── DÉPENSE
function renderDepense(){
  const compteOpts=DATA.comptes.map(c=>`<option value="${esc(c.id)}">${esc((c.flag||"🏦")+" "+c.label)}</option>`).join("");
  const catOpts=CATS.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  document.getElementById("tab-depense").innerHTML=`
  <div class="form-hdr">
    Nouvelle dépense
    <div class="form-hdr-sub">Saisissez les informations</div>
  </div>
  <div class="form-body">
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label req">Description</div>
        <input id="dep-desc" type="text" placeholder="Ex : Épicerie IGA">
      </div>
      <div class="form-row">
        <div class="form-row-label req">Montant</div>
        <input id="dep-montant" type="number" inputmode="decimal" placeholder="0,00 CAD">
      </div>
    </div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label">Date</div>
        <input id="dep-date" type="date" value="${today()}">
      </div>
      <div class="form-row">
        <div class="form-row-label">Catégorie</div>
        <select id="dep-cat"><option value="">Aucune</option>${catOpts}</select>
      </div>
      <div class="form-row">
        <div class="form-row-label">Compte</div>
        <select id="dep-compte">${compteOpts}</select>
      </div>
    </div>
    <div id="dep-err"></div>
    <button class="btn-primary green" onclick="saveDep()">Enregistrer la dépense</button>
  </div>`;
}
window.saveDep=async function(){
  const desc=document.getElementById("dep-desc").value.trim();
  const montant=parseFloat(document.getElementById("dep-montant").value);
  const err=document.getElementById("dep-err");
  if(!desc){err.innerHTML='<div class="form-err">Description requise</div>';return;}
  if(!montant||montant<=0){err.innerHTML='<div class="form-err">Montant invalide</div>';return;}
  DATA.depenses.unshift({id:Date.now(),date:document.getElementById("dep-date").value,desc,cat:document.getElementById("dep-cat").value,montant,compte:document.getElementById("dep-compte").value});
  await saveData(); flash("Dépense enregistrée ✓"); showDIPill("Dépense", "-"+fmtCAD(DATA.depenses[0].montant)); showTab("home");
};

// ── ARGENT
window.renderArgent=function(mode){
  const compteOpts=DATA.comptes.map(c=>`<option value="${esc(c.id)}">${esc((c.flag||"🏦")+" "+c.label)}</option>`).join("");
  let html=`<div class="form-hdr">Argent<div class="form-hdr-sub">Revenus & virements</div></div>
  <div class="seg-wrap"><div class="seg">
    <button class="seg-btn ${mode==="rev"?"active":""}" onclick="renderArgent('rev')">Revenu / Salaire</button>
    <button class="seg-btn ${mode==="vir"?"active":""}" onclick="renderArgent('vir')">Virement</button>
  </div></div>
  <div class="form-body">`;

  if(mode==="rev") html+=`
    <p class="form-info">Salaire ou revenu entrant → sélectionnez le compte destination</p>
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label req">Montant</div>
        <input id="rev-montant" type="number" inputmode="decimal" placeholder="0,00" oninput="updateConv()">
      </div>
      <div class="form-row">
        <div class="form-row-label">Devise</div>
        <select id="rev-devise" onchange="toggleTaux()"><option value="CAD">CAD</option><option value="EUR">EUR</option></select>
      </div>
      <div id="taux-rows" style="display:none">
        <div class="form-row">
          <div class="form-row-label">Taux EUR→CAD</div>
          <input id="rev-taux" type="number" step="0.0001" value="${DATA.taux}" oninput="updateConv()">
        </div>
      </div>
      <div id="conv-preview" class="form-row" style="display:none;color:#0EA47A;font-weight:600;font-size:14px;"></div>
    </div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label">Date</div>
        <input id="rev-date" type="date" value="${today()}">
      </div>
      <div class="form-row">
        <div class="form-row-label">Description</div>
        <input id="rev-desc" type="text" placeholder="Ex : Salaire mars">
      </div>
      <div class="form-row">
        <div class="form-row-label">Vers compte</div>
        <select id="rev-compte">${compteOpts}</select>
      </div>
    </div>
    <div id="rev-err"></div>
    <button class="btn-primary green" onclick="saveRev()">Enregistrer le revenu</button>`;
  else html+=`
    <p class="form-info">Ex : début de mois → Épargne Canada vers Compte budget Canada</p>
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label">De</div>
        <select id="vir-source">${compteOpts}</select>
      </div>
    </div>
    <div class="arrow-separator">
      <svg viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="6 14 12 20 18 14"/></svg>
    </div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-row-label">Vers</div>
        <select id="vir-dest">${compteOpts}</select>
      </div>
    </div>
    <div class="form-section" style="margin-top:16px">
      <div class="form-row">
        <div class="form-row-label req">Montant</div>
        <input id="vir-montant" type="number" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="form-row">
        <div class="form-row-label">Date</div>
        <input id="vir-date" type="date" value="${today()}">
      </div>
      <div class="form-row">
        <div class="form-row-label">Description</div>
        <input id="vir-desc" type="text" placeholder="Ex : Budget mars">
      </div>
    </div>
    <div id="vir-err"></div>
    <button class="btn-primary green" onclick="saveVir()">Enregistrer le virement</button>`;

  html+=`</div>`;
  document.getElementById("tab-argent").innerHTML=html;
};
window.toggleTaux=()=>{
  const eur=document.getElementById("rev-devise").value==="EUR";
  document.getElementById("taux-rows").style.display=eur?"block":"none";
  updateConv();
};
window.updateConv=()=>{
  const m=parseFloat(document.getElementById("rev-montant")?.value||0);
  const t=parseFloat(document.getElementById("rev-taux")?.value||DATA.taux);
  const el=document.getElementById("conv-preview");
  if(!el)return;
  const eur=document.getElementById("rev-devise")?.value==="EUR";
  if(eur&&m>0){el.style.display="flex";el.textContent=`≈ ${fmtCAD(m*t)}`;}
  else el.style.display="none";
};
window.saveRev=async function(){
  const montant=parseFloat(document.getElementById("rev-montant").value);
  const err=document.getElementById("rev-err");
  if(!montant||montant<=0){err.innerHTML='<div class="form-err">Montant invalide</div>';return;}
  const devise=document.getElementById("rev-devise").value;
  const t=devise==="EUR"?(parseFloat(document.getElementById("rev-taux").value)||DATA.taux):1;
  DATA.revenus.unshift({id:Date.now(),date:document.getElementById("rev-date").value,desc:document.getElementById("rev-desc").value.trim(),montant,montantNatif:montant,montantCAD:devise==="EUR"?montant*t:montant,devise,taux:t,compte:document.getElementById("rev-compte").value});
  await saveData(); flash("Revenu enregistré ✓"); showDIPill("Revenu reçu", "+"+fmtCAD(DATA.revenus[0].montantCAD||DATA.revenus[0].montant)); showTab("home");
};
window.saveVir=async function(){
  const montant=parseFloat(document.getElementById("vir-montant").value);
  const source=document.getElementById("vir-source").value;
  const dest=document.getElementById("vir-dest").value;
  const err=document.getElementById("vir-err");
  if(!montant||montant<=0){err.innerHTML='<div class="form-err">Montant invalide</div>';return;}
  if(source===dest){err.innerHTML='<div class="form-err">Source et destination identiques</div>';return;}
  DATA.virements.unshift({id:Date.now(),date:document.getElementById("vir-date").value,desc:document.getElementById("vir-desc").value.trim(),montant,source,dest});
  await saveData(); flash("Virement enregistré ✓"); showDIPill("Virement", fmtCAD(DATA.virements[0].montant)); showTab("home");
};

// ── RÉGLAGES
window.renderReglages=function(sec){
  const soldes=getSoldes();
  let html=`<div class="form-hdr">Réglages<div class="form-hdr-sub">Comptes, fixes & taux</div></div>
  <div class="seg-wrap"><div class="seg">
    <button class="seg-btn ${sec==="comptes"?"active":""}" onclick="renderReglages('comptes')">Comptes</button>
    <button class="seg-btn ${sec==="fixes"?"active":""}" onclick="renderReglages('fixes')">Fixes</button>
    <button class="seg-btn ${sec==="taux"?"active":""}" onclick="renderReglages('taux')">Taux & infos</button>
  </div></div>`;

  if(sec==="comptes"){
    html+=`
    <div class="settings-label">Soldes actuels</div>
    <div class="settings-card">
      ${DATA.comptes.map(c=>`
        <div class="settings-row">
          <div class="settings-row-icon">${esc(c.flag||"🏦")}</div>
          <div class="settings-row-main">
            <div class="settings-row-title">${esc(c.label)}</div>
          </div>
          <div class="settings-row-value ${c.devise==="EUR"?"amber":"green"}">${fmtNum(soldes[c.id]||0,c.devise)}</div>
        </div>`).join("")}
      <div class="stat-row">
        ${[{v:DATA.depenses.length,l:"dépenses"},{v:DATA.revenus.length,l:"revenus"},{v:DATA.virements.length,l:"virements"}].map(x=>`
          <div class="stat-item"><div class="stat-num">${x.v}</div><div class="stat-lbl">${x.l}</div></div>`).join("")}
      </div>
    </div>
    <div class="settings-label">Gérer les comptes</div>
    ${DATA.comptes.map((c,i)=>`
      <div class="compte-edit-card">
        <div class="compte-edit-row">
          <div class="compte-edit-flag" style="position:relative">
            ${esc(c.flag||"🏦")}
            <select style="position:absolute;inset:0;opacity:0;width:100%;height:100%" onchange="DATA.comptes[${i}].flag=this.value;renderReglages('comptes')">
              ${FLAGS.map(f=>`<option value="${f}"${f===c.flag?" selected":""}>${f}</option>`).join("")}
            </select>
          </div>
          <input class="ce-name-input" type="text" value="${esc(c.label)}" oninput="DATA.comptes[${i}].label=this.value">
          <select class="ce-devise" onchange="DATA.comptes[${i}].devise=this.value">
            <option value="CAD"${c.devise==="CAD"?" selected":""}>CAD</option>
            <option value="EUR"${c.devise==="EUR"?" selected":""}>EUR</option>
            <option value="USD"${c.devise==="USD"?" selected":""}>USD</option>
          </select>
          ${DATA.comptes.length>1?`<button class="ce-del" onclick="deleteCompte(${i})">×</button>`:""}
        </div>
        <div class="ce-ouv-row">
          <span class="ce-ouv-lbl">Solde d'ouverture</span>
          <input class="ce-ouv-input" type="number" value="${DATA.ouv[c.id]||0}" oninput="DATA.ouv['${c.id}']=parseFloat(this.value)||0">
        </div>
      </div>`).join("")}
    <div id="add-compte-area" style="padding:0 16px">
      <button class="btn-ghost" style="margin-bottom:8px" onclick="showAddCompte()">+ Ajouter un compte</button>
    </div>
    <div style="padding:0 16px 16px">
      <button class="btn-primary" id="save-comptes-btn" onclick="saveComptes()">Enregistrer les modifications</button>
    </div>`;
  }

  if(sec==="fixes"){
    const total=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
    html+=`
    <div class="settings-label">Dépenses fixes mensuelles</div>
    <div class="settings-card" style="margin:0 16px">
      ${DATA.fixes.map((f,i)=>`
        <div class="fix-row">
          <input class="fix-name" type="text" value="${esc(f.nom)}" placeholder="Nom" oninput="DATA.fixes[${i}].nom=this.value">
          <input class="fix-amt" type="number" value="${f.montant}" oninput="DATA.fixes[${i}].montant=parseFloat(this.value)||0;updateFixTotal()">
          <button class="fix-del" onclick="deleteFix(${i})">×</button>
        </div>`).join("")}
      <div class="fix-total" id="fix-total">Total mensuel : <strong>${fmtCAD(total)}</strong></div>
    </div>
    <div style="padding:12px 16px 0">
      <button class="btn-ghost" onclick="addFix()">+ Ajouter un poste</button>
    </div>
    <div style="padding:12px 16px 16px">
      <button class="btn-primary" id="save-fixes-btn" onclick="saveFixes()">Enregistrer</button>
    </div>`;
  }

  if(sec==="taux"){
    html+=`
    <div class="settings-label">Taux de change</div>
    <div class="settings-card" style="margin:0 16px">
      <div class="settings-row">
        <div class="settings-row-main">
          <div class="settings-row-title">Taux EUR → CAD</div>
          <div class="settings-row-sub">Modifier lors d'un virement France → Canada</div>
        </div>
        <input type="number" step="0.0001" id="taux-input" value="${DATA.taux}"
          style="width:90px;text-align:right;border:none;background:none;font-size:16px;font-weight:700;color:#0EA47A;outline:none"
          oninput="updateTauxPreview()">
      </div>
      <div class="settings-row">
        <div class="settings-row-main">
          <div class="settings-row-sub" id="taux-preview">1 EUR = ${Number(DATA.taux).toFixed(4)} CAD</div>
        </div>
      </div>
    </div>
    <div style="padding:12px 16px 16px">
      <button class="btn-primary" id="save-taux-btn" onclick="saveTaux()">Enregistrer le taux</button>
    </div>
    <div class="settings-label">Session</div>
    <button class="logout-btn" onclick="logout()">Se déconnecter</button>`;
  }

  document.getElementById("tab-reglages").innerHTML=html;
};

window.deleteCompte=function(i){
  if(DATA.comptes.length<=1)return;
  delete DATA.ouv[DATA.comptes[i].id];
  DATA.comptes.splice(i,1);
  renderReglages("comptes");
};
window.showAddCompte=function(){
  document.getElementById("add-compte-area").innerHTML=`
    <div class="add-compte-box">
      <div class="add-compte-title">Nouveau compte</div>
      <div class="add-compte-inputs">
        <select id="nc-flag">${FLAGS.map(f=>`<option value="${f}">${f}</option>`).join("")}</select>
        <input type="text" id="nc-label" placeholder="Nom du compte">
        <select id="nc-devise"><option value="CAD">CAD</option><option value="EUR">EUR</option><option value="USD">USD</option></select>
      </div>
      <div class="add-compte-btns">
        <button class="btn-ghost" style="flex:none;padding:10px 16px" onclick="renderReglages('comptes')">Annuler</button>
        <button class="btn-primary green" style="flex:1;margin-top:0" onclick="confirmAddCompte()">Ajouter</button>
      </div>
    </div>`;
};
window.confirmAddCompte=function(){
  const label=document.getElementById("nc-label").value.trim();
  if(!label)return;
  const id="c_"+Date.now();
  DATA.comptes.push({id,label,devise:document.getElementById("nc-devise").value,flag:document.getElementById("nc-flag").value});
  DATA.ouv[id]=0;
  renderReglages("comptes");
  flash("Compte ajouté ✓");
};
window.saveComptes=async function(){
  await saveData();
  const btn=document.getElementById("save-comptes-btn");
  btn.textContent="Enregistré ✓"; btn.classList.add("green");
  setTimeout(()=>{btn.textContent="Enregistrer les modifications";btn.classList.remove("green");},1500);
  flash("Enregistré ✓");
};
window.updateFixTotal=function(){
  const total=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
  const el=document.getElementById("fix-total");
  if(el)el.innerHTML=`Total mensuel : <strong>${fmtCAD(total)}</strong>`;
};
window.deleteFix=function(i){DATA.fixes.splice(i,1);renderReglages("fixes");};
window.addFix=function(){DATA.fixes.push({id:Date.now(),nom:"",montant:0});renderReglages("fixes");};
window.saveFixes=async function(){
  await saveData();
  const btn=document.getElementById("save-fixes-btn");
  btn.textContent="Enregistré ✓"; btn.classList.add("green");
  setTimeout(()=>{btn.textContent="Enregistrer";btn.classList.remove("green");},1500);
  flash("Enregistré ✓");
};
window.updateTauxPreview=function(){
  const v=parseFloat(document.getElementById("taux-input").value)||DATA.taux;
  const el=document.getElementById("taux-preview");
  if(el)el.textContent=`1 EUR = ${v.toFixed(4)} CAD`;
};
window.saveTaux=async function(){
  DATA.taux=parseFloat(document.getElementById("taux-input").value)||DATA.taux;
  await saveData();
  const btn=document.getElementById("save-taux-btn");
  btn.textContent="Enregistré ✓"; btn.classList.add("green");
  setTimeout(()=>{btn.textContent="Enregistrer le taux";btn.classList.remove("green");},1500);
  flash("Taux mis à jour ✓");
};
window.logout=function(){
  localStorage.removeItem("budget_code");
  if(unsubscribe)unsubscribe();
  location.reload();
};
</script>
</body>
</html>
