<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0F1E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Budget</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --top:env(safe-area-inset-top,54px);
  --bot:env(safe-area-inset-bottom,20px);
  --navy:#0A0F1E;--navy2:#111827;--navy3:#1C2639;
  --teal:#0EA47A;--teal2:#0C8F6B;--teal-l:rgba(14,164,122,0.12);
  --blue:#2563EB;--blue-l:rgba(37,99,235,0.1);
  --amber:#D97706;--amber-l:rgba(217,119,6,0.1);
  --red:#DC2626;--red-l:rgba(220,38,38,0.1);
  --white:#FFFFFF;--gray1:#F9FAFB;--gray2:#F3F4F6;--gray3:#E5E7EB;
  --gray4:#9CA3AF;--text1:#111827;--text2:#374151;--text3:#6B7280;
  --card-r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{background:var(--navy);}
body{font-family:-apple-system,'SF Pro Display','SF Pro Text',sans-serif;background:var(--gray1);max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;}
input,select,button{font-family:inherit;}
.hidden{display:none!important;}
/* LOCK */
#lock-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:calc(var(--top) + 20px) 32px calc(var(--bot) + 20px);}
.lock-icon{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--teal),#0891B2);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:28px;}
.lock-title{font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.8px;margin-bottom:8px;}
.lock-sub{font-size:15px;color:rgba(255,255,255,.4);text-align:center;line-height:1.5;margin-bottom:32px;}
.lock-input{width:100%;padding:16px;border-radius:14px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:white;font-size:17px;font-weight:600;text-align:center;letter-spacing:2px;outline:none;margin-bottom:12px;-webkit-appearance:none;}
.lock-input:focus{border-color:var(--teal);}
.lock-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:0;font-weight:400;font-size:15px;}
.lock-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--teal);color:white;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.lock-err{color:#F87171;font-size:13px;margin-top:8px;text-align:center;}
.lock-loading{display:flex;align-items:center;gap:10px;color:var(--teal);font-size:14px;font-weight:500;}
.faceid-btn{width:100%;padding:14px;border-radius:14px;border:none;background:#1C2639;color:var(--teal);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.lock-switch{background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;margin-top:10px;display:block;width:100%;text-align:center;}
/* NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:0.5px solid rgba(0,0,0,.1);padding-bottom:calc(var(--bot) + 8px);z-index:100;display:flex;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 6px;background:none;border:none;cursor:pointer;gap:3px;}
.nb svg{width:23px;height:23px;stroke:#bbb;transition:stroke .2s;}
.nb span{font-size:10px;color:#bbb;font-weight:500;transition:color .2s;}
.nb.on svg{stroke:var(--teal);}
.nb.on span{color:var(--teal);}
/* SCREEN */
.screen{padding-bottom:calc(var(--bot) + 90px);min-height:100dvh;}
/* TOAST */
#toast{position:fixed;top:calc(var(--top) + 8px);left:50%;transform:translateX(-50%);background:rgba(17,24,39,.95);backdrop-filter:blur(10px);color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:300;white-space:nowrap;pointer-events:none;}
/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:150;}
.modal{background:white;border-radius:28px 28px 0 0;padding:8px 24px calc(var(--bot) + 28px);width:100%;max-width:430px;animation:slideUp .3s cubic-bezier(.32,1,.23,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--gray3);border-radius:2px;margin:12px auto 20px;}
/* SYNC */
#sync-bar{position:fixed;top:calc(var(--top) + 8px);left:50%;transform:translateX(-50%);background:var(--teal);color:white;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:200;}
/* DI */
.di-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--top) + 2px);background:var(--navy);z-index:98;pointer-events:none;}
.di-pill{position:fixed;top:12px;left:50%;transform:translateX(-50%);height:34px;min-width:120px;background:#000;border-radius:20px;display:flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;transition:all .4s cubic-bezier(.32,1,.23,1);z-index:99;}
.di-pill.exp{min-width:200px;height:38px;}
.di-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.di-text{font-size:13px;font-weight:600;color:white;white-space:nowrap;}
.di-amt{font-size:13px;font-weight:700;color:var(--teal);white-space:nowrap;}
/* HERO */
.hero{background:var(--navy);padding:calc(var(--top) + 20px) 24px 32px;position:relative;overflow:hidden;}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.pbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 12px 5px 8px;cursor:pointer;border:none;}
.pavatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.pname{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;}
.settings-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.settings-btn svg{width:18px;height:18px;stroke:rgba(255,255,255,.6);}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:8px;}
.hero-amt{font-size:46px;font-weight:800;color:white;letter-spacing:-2px;line-height:1;margin-bottom:6px;}
.hero-sub{font-size:17px;color:rgba(255,255,255,.4);font-weight:500;margin-bottom:24px;}
.hero-date{font-size:12px;color:rgba(255,255,255,.25);}
/* SECTIONS */
.pad{padding:16px 16px 0;}
.stitle{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding:0 2px;}
/* ACCOUNT CARDS */
.ag{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ac{background:white;border-radius:var(--card-r);padding:16px;position:relative;}
.ac::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--card-r) var(--card-r) 0 0;}
.ac.cad::after{background:linear-gradient(90deg,var(--teal),#0891B2);}
.ac.eur::after{background:linear-gradient(90deg,var(--amber),#F59E0B);}
.ac-flag{font-size:20px;margin-bottom:10px;}
.ac-name{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;}
.ac-amt{font-size:18px;font-weight:800;}
.ac-amt.cad{color:var(--teal);}
.ac-amt.eur{color:var(--amber);}
/* SOLDE */
.sc{background:white;border-radius:var(--card-r);padding:20px;}
.sc.neg{background:#FFF5F5;}
.sc-lbl{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.sc-amt{font-size:38px;font-weight:800;letter-spacing:-1.5px;margin-bottom:16px;}
.sc-amt.pos{color:var(--text1);}
.sc-amt.neg{color:var(--red);}
.pills{display:flex;gap:8px;padding-top:16px;border-top:1px solid var(--gray3);}
.pill{flex:1;}
.pill-n{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.pill-v{font-size:13px;font-weight:700;padding:4px 8px;border-radius:8px;display:inline-block;}
.pteal{color:var(--teal);background:var(--teal-l);}
.pblue{color:var(--blue);background:var(--blue-l);}
.pamber{color:var(--amber);background:var(--amber-l);}
/* CHART */
.chart-wrap{background:white;border-radius:var(--card-r);padding:16px;overflow:hidden;}
.chart-ch{position:relative;height:120px;}
/* OBJECTIVES */
.obj-card{background:white;border-radius:var(--card-r);padding:16px;}
.obj-row{padding:12px 0;border-bottom:.5px solid var(--gray2);}
.obj-row:last-of-type{border-bottom:none;}
.obj-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.obj-name{font-size:15px;font-weight:600;color:var(--text1);}
.obj-pct{font-size:13px;font-weight:700;color:var(--teal);}
.obj-bar{height:6px;background:var(--gray2);border-radius:3px;margin-bottom:6px;overflow:hidden;}
.obj-fill{height:100%;background:linear-gradient(90deg,var(--teal),#0891B2);border-radius:3px;}
.obj-ft{display:flex;justify-content:space-between;}
.obj-amts{font-size:12px;color:var(--text3);}
.obj-pm{font-size:12px;color:var(--amber);font-weight:600;}
/* LIST */
.lcard{background:white;border-radius:var(--card-r);overflow:hidden;}
.lr{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:.5px solid var(--gray2);}
.lr:last-child{border-bottom:none;}
.lr.tap{cursor:pointer;}
.lr.tap:active{background:var(--gray2);}
.row-t{font-size:15px;font-weight:500;color:var(--text1);}
.row-s{font-size:12px;color:var(--text3);margin-top:2px;}
.row-a{font-size:15px;font-weight:700;color:var(--red);flex-shrink:0;margin-left:12px;}
.row-ag{color:var(--teal);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6;}
/* FORM */
.fhdr{background:var(--navy);padding:calc(var(--top) + 16px) 20px 20px;font-size:28px;font-weight:800;color:white;letter-spacing:-0.8px;}
.fhdr-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px;font-weight:400;}
.fbody{padding:16px;display:flex;flex-direction:column;gap:0;}
.fsec{background:white;border-radius:var(--card-r);overflow:hidden;margin-bottom:16px;}
.frow{display:flex;align-items:center;padding:0 16px;border-bottom:.5px solid var(--gray2);min-height:52px;}
.frow:last-child{border-bottom:none;}
.flbl{font-size:15px;color:var(--text1);font-weight:500;flex-shrink:0;width:110px;}
.flbl.req::after{content:' *';color:var(--teal);}
.frow input,.frow select{flex:1;border:none;background:none;outline:none;font-size:15px;color:var(--text2);text-align:right;padding:14px 0;-webkit-appearance:none;appearance:none;}
.finfo{background:rgba(14,164,122,.08);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--teal2);line-height:1.5;margin-bottom:16px;}
.fconv{font-size:13px;color:var(--teal);font-weight:600;padding:4px 0 8px;}
.ferr{background:var(--red-l);color:var(--red);border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:8px;}
/* BUTTONS */
.btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--navy);color:white;font-size:17px;font-weight:700;cursor:pointer;}
.btn.green{background:var(--teal);}
.btn.green:active{background:var(--teal2);}
.btn.ghost{background:none;border:1.5px solid var(--gray3);color:var(--text2);font-size:15px;padding:14px;}
.btn.danger{background:var(--red-l);color:var(--red);border:none;padding:14px;font-size:15px;font-weight:600;}
.btn.sml{padding:10px 16px;width:auto;border-radius:12px;}
.btn-row{display:flex;gap:10px;margin-top:0;}
/* SEG */
.seg-w{padding:12px 16px 0;}
.seg{display:flex;background:var(--gray2);border-radius:10px;padding:3px;gap:2px;overflow-x:auto;}
.seg::-webkit-scrollbar{display:none;}
.sb{flex:1;flex-shrink:0;padding:8px 10px;border-radius:8px;border:none;background:none;font-size:13px;color:var(--text3);cursor:pointer;font-weight:500;white-space:nowrap;}
.sb.on{background:white;color:var(--text1);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.12);}
/* SETTINGS */
.slbl{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:20px 16px 8px;}
.scard{background:white;border-radius:var(--card-r);overflow:hidden;margin:0 16px;}
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--gray2);}
.srow:last-child{border-bottom:none;}
.sicon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.smain{flex:1;min-width:0;}
.stit{font-size:15px;font-weight:500;color:var(--text1);}
.ssub{font-size:12px;color:var(--text3);margin-top:1px;}
.sval{font-size:15px;color:var(--text3);flex-shrink:0;}
.sval.green{color:var(--teal);font-weight:600;}
.sval.amber{color:var(--amber);font-weight:600;}
.stat-row{display:flex;}
.stat-i{flex:1;text-align:center;padding:16px 0;}
.stat-n{font-size:24px;font-weight:800;color:var(--text1);}
.stat-l{font-size:11px;color:var(--text3);margin-top:2px;}
/* COMPTE EDIT */
.cecard{background:white;border-radius:var(--card-r);overflow:hidden;margin:0 16px 10px;}
.cerow{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:.5px solid var(--gray2);}
.ceflag{font-size:22px;width:38px;height:38px;border-radius:10px;background:var(--gray2);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.ceflag select{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.cename{flex:1;border:none;background:none;outline:none;font-size:15px;font-weight:500;color:var(--text1);padding:8px 0;}
.cedev{border:none;background:var(--gray2);border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0;-webkit-appearance:none;appearance:none;}
.cedel{width:30px;height:30px;border-radius:8px;border:none;background:var(--red-l);color:var(--red);cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ouvrow{display:flex;align-items:center;padding:10px 14px;gap:10px;}
.ouvlbl{font-size:13px;color:var(--text3);flex-shrink:0;}
.ouvinp{flex:1;border:none;background:none;outline:none;font-size:15px;font-weight:600;color:var(--teal);text-align:right;padding:6px 0;}
/* ADD COMPTE */
.addbox{background:rgba(14,164,122,.06);border-radius:var(--card-r);padding:16px;margin:0 16px;}
.addtitle{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px;}
.addinputs{display:flex;gap:8px;margin-bottom:12px;}
.addinputs input,.addinputs select{padding:10px 12px;border-radius:10px;border:1.5px solid var(--gray3);background:white;font-size:14px;color:var(--text1);outline:none;-webkit-appearance:none;}
.addinputs input{flex:1;}
.addinputs select{width:72px;}
/* FIXES */
.fixrow{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:.5px solid var(--gray2);}
.fixname{flex:1;border:none;background:none;outline:none;font-size:15px;color:var(--text1);padding:4px 0;}
.fixamt{width:90px;border:none;background:none;outline:none;font-size:15px;font-weight:600;color:var(--teal);text-align:right;padding:4px 0;}
.fixdel{width:28px;height:28px;border-radius:50%;border:none;background:var(--red-l);color:var(--red);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.fixtot{padding:14px 16px;font-size:14px;color:var(--text3);border-top:.5px solid var(--gray2);}
/* HISTORIQUE */
.search-wrap{padding:12px 16px 0;}
.sbar{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:10px 14px;}
.sbar svg{width:18px;height:18px;stroke:var(--gray4);flex-shrink:0;}
.sbar input{flex:1;border:none;background:none;outline:none;font-size:15px;color:var(--text1);}
.chips{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--gray3);background:white;font-size:13px;color:var(--text3);white-space:nowrap;cursor:pointer;flex-shrink:0;}
.chip.on{background:var(--navy);color:white;border-color:var(--navy);}
.mhdr{padding:16px 16px 6px;font-size:13px;font-weight:700;color:var(--text3);display:flex;justify-content:space-between;}
.mtot{font-size:13px;color:var(--red);font-weight:700;}
.who{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;flex-shrink:0;}
.wp{background:#EFF6FF;color:#2563EB;}
.wl{background:#FDF4FF;color:#9333EA;}
/* PREVISIONS */
.pscen{display:flex;gap:8px;padding:12px 16px;}
.psb{flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--gray3);background:white;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;}
.psb.on{background:var(--navy);color:white;border-color:var(--navy);}
.pmc{background:white;border-radius:var(--card-r);margin:0 16px 12px;overflow:hidden;}
.pmh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:.5px solid var(--gray2);background:var(--gray1);}
.pmname{font-size:15px;font-weight:700;color:var(--text1);}
.psolde{font-size:15px;font-weight:800;}
.psolde.pos{color:var(--teal);}
.psolde.neg{color:var(--red);}
.pdr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:.5px solid var(--gray2);}
.pdr:last-child{border-bottom:none;}
.pname{font-size:14px;color:var(--text1);}
.ptype{font-size:11px;color:var(--text3);margin-top:1px;}
.pamt{font-size:14px;font-weight:700;}
.pamt.cr{color:var(--teal);}
.pamt.db{color:var(--red);}
.padd{display:flex;align-items:center;gap:8px;padding:12px 16px;color:var(--teal);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;width:100%;}
/* ARROW */
.arr{display:flex;align-items:center;justify-content:center;padding:6px 0;color:var(--gray4);}
.arr svg{width:20px;height:20px;}
/* OBJ EDIT */
.oecard{background:white;border-radius:var(--card-r);margin:0 16px 10px;overflow:hidden;}
.oecard .frow{min-height:48px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="di-bar"></div>
<div class="di-pill hidden" id="di-pill"><div class="di-dot"></div><div class="di-text" id="di-text"></div><div class="di-amt" id="di-amt"></div></div>
<div id="toast" class="hidden"></div>
<div id="sync-bar" class="hidden"></div>
<div id="overlay" class="overlay hidden"></div>

<!-- LOCK -->
<div id="lock-screen">
  <div style="height:calc(var(--top) + 8px)"></div>
  <div class="lock-icon">💰</div>
  <div class="lock-title">Budget</div>
  <div class="lock-sub" id="lock-sub">Connexion en cours...</div>
  <div id="lock-form" class="hidden" style="width:100%">
    <input class="lock-input" type="password" id="lock-code" placeholder="Code secret partagé" autocomplete="off" autocorrect="off" autocapitalize="off"/>
    <button class="lock-btn" id="lock-btn">Accéder</button>
  </div>
  <div id="faceid-wrap" class="hidden" style="width:100%">
    <button class="faceid-btn" id="faceid-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 100 10A5 5 0 0012 2z"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6"/></svg>

const FB = { apiKey:"AIzaSyBxgpSk3uUNMgT-jWChST836f17RqA_WvY", authDomain:"budget-couple-95b8e.firebaseapp.com", projectId:"budget-couple-95b8e", storageBucket:"budget-couple-95b8e.firebasestorage.app", messagingSenderId:"719726877379", appId:"1:719726877379:web:0c34a2ec32b0c5e66ce076" };
const app = initializeApp(FB);

// ── DEFAULTS
const DEF_COMPTES = [

const DEF_OBJS = [{id:1,nom:"🏠 Mise de fonds",cible:50000,acc:5000,dt:"2028-06"},{id:2,nom:"✈️ Voyage",cible:5000,acc:1000,dt:"2025-12"},{id:3,nom:"🚗 Voiture",cible:15000,acc:2000,dt:"2027-06"},{id:4,nom:"🛡️ Fonds urgence",cible:10000,acc:3000,dt:"2026-06"}];
const DEF_DATA = {depenses:[],revenus:[],virements:[],fixes:DEF_FIXES,comptes:DEF_COMPTES,ouv:{budget_ca:2100,epargne_ca:15000,joint_fr:2000,livret_fr:8000},taux:1.46,objectifs:[],previsions:{}};

let DATA = JSON.parse(JSON.stringify(DEF_DATA));
let docRef=null, unsub=null, ignoreNext=false;

// ── UTILS
const today = () => new Date().toISOString().slice(0,10);
const fC = n => new Intl.NumberFormat("fr-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}).format(Math.round(n));
const fE = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(Math.round(n));
const fN = (n,d) => d==="EUR"?fE(n):fC(n);
const cm = () => today().slice(0,7);
const mL = () => new Date().toLocaleString("fr-FR",{month:"long",year:"numeric"});
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let tTimer;
function flash(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.remove("hidden");clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.add("hidden"),2200);}
function showSync(msg){const b=document.getElementById("sync-bar");b.textContent=msg;b.classList.remove("hidden");setTimeout(()=>b.classList.add("hidden"),2500);}

let diTimer;
function showDI(text,amt,ms=3000){
  const p=document.getElementById("di-pill");
  document.getElementById("di-text").textContent=text;
  document.getElementById("di-amt").textContent=amt||"";
  p.classList.remove("hidden");

async function saveData(){
  if(!docRef)return;
  ignoreNext=true;
  try{await setDoc(docRef,DATA);}
  catch(e){flash("Erreur sauvegarde");}
}

function getSoldes(){
  const s={};
  DATA.comptes.forEach(c=>s[c.id]=(DATA.ouv[c.id]||0));
  DATA.revenus.forEach(r=>{if(s[r.compte]!==undefined)s[r.compte]+=parseFloat(r.montantNatif)||0;});
  DATA.virements.forEach(v=>{if(s[v.source]!==undefined)s[v.source]-=parseFloat(v.montant)||0;if(s[v.dest]!==undefined)s[v.dest]+=parseFloat(v.montant)||0;});
  DATA.depenses.forEach(d=>{if(s[d.compte]!==undefined)s[d.compte]-=parseFloat(d.montant)||0;});
  return s;
}

// ── SESSION
const SESSION_MS = 60*60*1000;
const FACEID_KEY = "budget_faceid";
function getAge(){const t=localStorage.getItem("budget_ts");return t?Date.now()-parseInt(t):Infinity;}
function refreshTs(){localStorage.setItem("budget_ts",Date.now().toString());}
function sessionOk(){return getAge()<SESSION_MS;}

// ── PROFILE
const PROFILE_KEY = "budget_profile";
function getProfile(){return localStorage.getItem(PROFILE_KEY)||null;}

// ── CONNECT
async function connect(code){
  docRef=doc(db,"budgets",code);
  const snap=await getDoc(docRef);
  if(snap.exists()) DATA={...JSON.parse(JSON.stringify(DEF_DATA)),...snap.data()};
  else{await setDoc(docRef,DEF_DATA);DATA=JSON.parse(JSON.stringify(DEF_DATA));}
  if(unsub)unsub();
  unsub=onSnapshot(docRef,s=>{
    if(ignoreNext){ignoreNext=false;return;}
    if(s.exists()){DATA={...JSON.parse(JSON.stringify(DEF_DATA)),...s.data()};showSync("Synchro reçue");renderTab(activeTab());}
  });
  localStorage.setItem("budget_code",code);
  document.getElementById("lock-screen").classList.add("hidden");
  document.getElementById("main-nav").classList.remove("hidden");
  showTab("home");
}

function activeTab(){return document.querySelector(".nb.on")?.id?.replace("nb-","")||"home";}

function showLock(msg){
  document.getElementById("lock-screen").classList.remove("hidden");
  document.getElementById("main-nav").classList.add("hidden");
  ["home","depense","argent","historique","previsions","reglages"].forEach(t=>document.getElementById("tab-"+t).classList.add("hidden"));
  document.getElementById("lock-err").classList.add("hidden");
  document.getElementById("lock-loading").classList.add("hidden");
  if(msg){document.getElementById("lock-sub").textContent=msg;}
  const hasFI=localStorage.getItem(FACEID_KEY)&&window.PublicKeyCredential;
  const code=localStorage.getItem("budget_code");
  if(hasFI&&code){
    document.getElementById("lock-sub").textContent=msg||"Vérifiez votre identité";
    document.getElementById("lock-form").classList.add("hidden");
    document.getElementById("faceid-wrap").classList.remove("hidden");
    setTimeout(()=>doFaceID(),400);
  } else {
    document.getElementById("lock-sub").textContent=msg||"Entrez votre code secret";
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
  }
}

async function doFaceID(){
  const stored=localStorage.getItem(FACEID_KEY);
  if(!stored||!window.PublicKeyCredential)return;
  const{id,code}=JSON.parse(stored);
  try{
    const ch=crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{type:"public-key",id:new Uint8Array(id)}],userVerification:"required",timeout:60000}});
    document.getElementById("lock-loading").classList.remove("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
    await connect(code);refreshTs();
  } catch(e){
    document.getElementById("lock-err").textContent="Face ID annulé — utilisez le code";
    document.getElementById("lock-err").classList.remove("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("faceid-wrap").classList.add("hidden");
  }
}

async function doUnlock(){
  const raw=document.getElementById("lock-code").value.trim();
  if(!raw){document.getElementById("lock-err").textContent="Entrez un code";document.getElementById("lock-err").classList.remove("hidden");return;}
  const code=raw.toLowerCase().replace(/[^a-z0-9\-_]/g,"");
  if(code.length<2){document.getElementById("lock-err").textContent="Code trop court";document.getElementById("lock-err").classList.remove("hidden");return;}
  document.getElementById("lock-err").classList.add("hidden");
  document.getElementById("lock-form").classList.add("hidden");
  document.getElementById("lock-loading").classList.remove("hidden");
  try{
    await connect(code);refreshTs();
    if(window.PublicKeyCredential&&!localStorage.getItem(FACEID_KEY)){
      setTimeout(async()=>{
        try{
          const ch=crypto.getRandomValues(new Uint8Array(32));
          const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:"Budget"},user:{id:new TextEncoder().encode(code),name:"budget",displayName:"Budget"},pubKeyCredParams:[{type:"public-key",alg:-7}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"preferred"},timeout:60000}});
          localStorage.setItem(FACEID_KEY,JSON.stringify({id:Array.from(new Uint8Array(cred.rawId)),code}));
          flash("Face ID activé ✓");
        } catch(e){}
      },1200);
    }
  } catch(e){
    document.getElementById("lock-loading").classList.add("hidden");
    document.getElementById("lock-form").classList.remove("hidden");
    document.getElementById("lock-err").textContent="Erreur: "+(e.code||e.message||"vérifiez internet");
    document.getElementById("lock-err").classList.remove("hidden");
  }
}

// Wire buttons
document.getElementById("lock-btn").addEventListener("click",doUnlock);
document.getElementById("lock-code").addEventListener("keydown",e=>{if(e.key==="Enter")doUnlock();});
document.getElementById("faceid-btn").addEventListener("click",doFaceID);

function showTab(tab){

// ── CHART
function renderChart(){
  const soldes=getSoldes();
  const pat=DATA.comptes.reduce((a,c)=>a+(soldes[c.id]||0)*(c.devise==="EUR"?DATA.taux:1),0);
  const cur=cm();
  let snaps=JSON.parse(localStorage.getItem("ps")||"[]");
  const ex=snaps.find(s=>s.m===cur);
  if(!ex)snaps.push({m:cur,v:Math.round(pat)});else ex.v=Math.round(pat);
  if(snaps.length>13)snaps=snaps.slice(-13);
  localStorage.setItem("ps",JSON.stringify(snaps));
  const container=document.getElementById("chart-container");
  if(!container)return;
  if(snaps.length<2){container.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Le graphique apparaît après le 2e mois</div>';return;}
  container.innerHTML='<div class="chart-ch"><canvas id="pc"></canvas></div>';
  setTimeout(()=>{
    const c=document.getElementById("pc");if(!c)return;
    if(window._pc)window._pc.destroy();
    window._pc=new Chart(c,{type:"line",data:{labels:snaps.map(s=>{const[y,mo]=s.m.split("-");return new Date(y,mo-1).toLocaleString("fr-FR",{month:"short"});}),datasets:[{data:snaps.map(s=>s.v),borderColor:"#0EA47A",borderWidth:2.5,pointBackgroundColor:"#0EA47A",pointRadius:3,tension:0.4,fill:true,backgroundColor:"rgba(14,164,122,0.08)"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#9CA3AF"}},y:{display:false}}}});
  },50);
}

// ── OBJECTIVES render
function renderObjs(){
  const objs=(DATA.objectifs&&DATA.objectifs.length)?DATA.objectifs:DEF_OBJS;
  let h='<div class="obj-card">';
  objs.forEach(o=>{
    const acc=o.acc||0;const pct=Math.min(acc/o.cible,1);const pd=Math.round(pct*100);
    const mo=o.dt?(()=>{const[y,m]=o.dt.split("-").map(Number);const now=new Date();return(y-now.getFullYear())*12+(m-now.getMonth()-1);})():null;
    const pm=(mo&&mo>0)?Math.ceil(Math.max(o.cible-acc,0)/mo):null;
    h+=`<div class="obj-row"><div class="obj-hdr"><div class="obj-name">${esc(o.nom)}</div><div class="obj-pct">${pd}%</div></div>`;
    h+=`<div class="obj-bar"><div class="obj-fill" style="width:${pd}%"></div></div>`;
    h+=`<div class="obj-ft"><div class="obj-amts">${fC(acc)} / ${fC(o.cible)}</div>`;
    if(pm)h+=`<div class="obj-pm">${fC(pm)}/mois</div>`;
    h+=`</div></div>`;
  });
  h+=`<button class="padd" id="obj-settings-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Gérer les objectifs</button>`;
  return h+'</div>';
}

// ── HOME
function renderHome(){
  const soldes=getSoldes();
  const mon=cm();
  const depMois=DATA.depenses.filter(d=>d.date&&d.date.startsWith(mon));

    </div>
    <div class="hero-eyebrow">Patrimoine total</div>
    <div class="hero-amt">${fC(pat)}</div>
    <div class="hero-sub">${fE(pat/DATA.taux)}</div>

  </div>
  <div class="pad"><div class="stitle">Vos comptes</div><div class="ag">
    ${DATA.comptes.map(c=>`<div class="ac ${c.devise==="EUR"?"eur":"cad"}"><div class="ac-flag">${esc(c.flag||"🏦")}</div><div class="ac-name">${esc(c.label)}</div><div class="ac-amt ${c.devise==="EUR"?"eur":"cad"}">${fN(soldes[c.id]||0,c.devise)}</div></div>`).join("")}

    <button id="pm-lealin" style="flex:1;padding:20px;border-radius:16px;border:2px solid #9333EA;background:#FDF4FF;color:#9333EA;font-size:17px;font-weight:700;cursor:pointer">Lealin</button>

function closeModal(){document.getElementById("overlay").classList.add("hidden");}
window.closeModal=closeModal;

// ── DEP DETAIL
function openDepDetail(id){
  const dep=DATA.depenses.find(d=>String(d.id)===String(id));
  if(!dep)return;
  const c=DATA.comptes.find(x=>x.id===dep.compte);
  const o=document.getElementById("overlay");
  const d=document.createElement("div");
  d.className="modal";
  d.innerHTML=`<div class="modal-handle"></div>
    <div style="font-size:20px;font-weight:800;color:var(--text1);margin-bottom:4px">${esc(dep.desc)}</div>
    <div style="font-size:32px;font-weight:800;color:var(--red);margin-bottom:8px">${fC(dep.montant)}</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:2px">${esc(dep.cat||"—")} · ${esc(dep.date)}</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:20px">${c?esc((c.flag||"🏦")+" "+c.label):esc(dep.compte)}</div>
    <div class="btn-row">
      <button class="btn ghost" id="dm-close">Fermer</button>
      <button class="btn danger" id="dm-del">Supprimer</button>
    </div>`;
  o.innerHTML=""; o.appendChild(d); o.classList.remove("hidden");
  o.onclick=()=>closeModal(); d.onclick=e=>e.stopPropagation();
  d.querySelector("#dm-close").addEventListener("click",closeModal);
  d.querySelector("#dm-del").addEventListener("click",async()=>{DATA.depenses=DATA.depenses.filter(x=>String(x.id)!==String(id));await saveData();closeModal();flash("Supprimé");renderHome();if(document.getElementById("tab-historique")&&!document.getElementById("tab-historique").classList.contains("hidden"))renderHistorique();});
}

// ── DÉPENSE
function renderDepense(){
  const el=document.getElementById("tab-depense");
  const copts=DATA.comptes.map(c=>`<option value="${esc(c.id)}">${esc((c.flag||"🏦")+" "+c.label)}</option>`).join("");
  const katopts=CATS.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");
  el.innerHTML=`<div class="fhdr">Nouvelle dépense<div class="fhdr-sub">Saisissez les informations</div></div>
  <div class="fbody">
    <div class="fsec">
      <div class="frow"><div class="flbl req">Description</div><input id="d-desc" type="text" placeholder="Ex : Épicerie IGA"></div>
      <div class="frow"><div class="flbl req">Montant CAD</div><input id="d-montant" type="number" inputmode="decimal" placeholder="0"></div>
    </div>
    <div class="fsec">
      <div class="frow"><div class="flbl">Date</div><input id="d-date" type="date" value="${today()}"></div>
      <div class="frow"><div class="flbl">Catégorie</div><select id="d-cat"><option value="">Aucune</option>${katopts}</select></div>
      <div class="frow"><div class="flbl">Compte</div><select id="d-compte">${copts}</select></div>
    </div>
    <div id="d-err"></div>
    <button class="btn green" id="d-save">Enregistrer la dépense</button>
  </div>`;
  el.querySelector("#d-save").addEventListener("click",async()=>{
    const desc=el.querySelector("#d-desc").value.trim();
    const montant=parseFloat(el.querySelector("#d-montant").value);
    const errEl=el.querySelector("#d-err");
    if(!desc){errEl.innerHTML='<div class="ferr">Description requise</div>';return;}
    if(!montant||montant<=0){errEl.innerHTML='<div class="ferr">Montant invalide</div>';return;}
    const dep={id:Date.now(),date:el.querySelector("#d-date").value,desc,cat:el.querySelector("#d-cat").value,montant,compte:el.querySelector("#d-compte").value,who:getProfile()||""};
    DATA.depenses.unshift(dep);
    await saveData();refreshTs();flash("Dépense enregistrée ✓");showDI("Dépense","-"+fC(montant));showTab("home");
  });
}

// ── ARGENT
let argMode="rev";
function renderArgent(mode){
  argMode=mode;
  const el=document.getElementById("tab-argent");
  const copts=DATA.comptes.map(c=>`<option value="${esc(c.id)}">${esc((c.flag||"🏦")+" "+c.label)}</option>`).join("");
  let h=`<div class="fhdr">Argent<div class="fhdr-sub">Revenus & virements</div></div>
  <div class="seg-w"><div class="seg">
    <button class="sb ${mode==="rev"?"on":""}" id="arg-rev-btn">Revenu / Salaire</button>
    <button class="sb ${mode==="vir"?"on":""}" id="arg-vir-btn">Virement</button>
  </div></div>
  <div class="fbody">`;
  if(mode==="rev"){
    h+=`<p class="finfo">Salaire ou revenu entrant → choisissez le compte destination</p>
    <div class="fsec">
      <div class="frow"><div class="flbl req">Montant</div><input id="r-montant" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><div class="flbl">Devise</div><select id="r-devise"><option value="CAD">CAD</option><option value="EUR">EUR</option></select></div>
      <div class="frow hidden" id="r-taux-row"><div class="flbl">Taux EUR→CAD</div><input id="r-taux" type="number" step="0.0001" value="${DATA.taux}"></div>
    </div>
    <div id="r-conv" class="fconv hidden"></div>
    <div class="fsec">
      <div class="frow"><div class="flbl">Date</div><input id="r-date" type="date" value="${today()}"></div>
      <div class="frow"><div class="flbl">Description</div><input id="r-desc" type="text" placeholder="Ex : Salaire mars"></div>
      <div class="frow"><div class="flbl">Vers compte</div><select id="r-compte">${copts}</select></div>
    </div>
    <div id="r-err"></div>
    <button class="btn green" id="r-save">Enregistrer le revenu</button>`;
  } else {
    h+=`<p class="finfo">Ex : Épargne Canada vers Budget Canada en début de mois</p>
    <div class="fsec"><div class="frow"><div class="flbl">De</div><select id="v-source">${copts}</select></div></div>
    <div class="arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="6 14 12 20 18 14"/></svg></div>
    <div class="fsec"><div class="frow"><div class="flbl">Vers</div><select id="v-dest">${copts}</select></div></div>
    <div class="fsec" style="margin-top:16px">
      <div class="frow"><div class="flbl req">Montant</div><input id="v-montant" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="frow"><div class="flbl">Date</div><input id="v-date" type="date" value="${today()}"></div>
      <div class="frow"><div class="flbl">Description</div><input id="v-desc" type="text" placeholder="Ex : Budget mars"></div>
    </div>
    <div id="v-err"></div>
    <button class="btn green" id="v-save">Enregistrer le virement</button>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
  el.querySelector("#arg-rev-btn")?.addEventListener("click",()=>renderArgent("rev"));
  el.querySelector("#arg-vir-btn")?.addEventListener("click",()=>renderArgent("vir"));
  if(mode==="rev"){
    const devSel=el.querySelector("#r-devise");
    const updateConv=()=>{
      const eur=devSel.value==="EUR";
      el.querySelector("#r-taux-row").classList.toggle("hidden",!eur);
      const m=parseFloat(el.querySelector("#r-montant").value)||0;
      const t=parseFloat(el.querySelector("#r-taux").value)||DATA.taux;
      const conv=el.querySelector("#r-conv");
      if(eur&&m>0){conv.classList.remove("hidden");conv.textContent="≈ "+fC(m*t);}
      else conv.classList.add("hidden");
    };
    devSel.addEventListener("change",updateConv);
    el.querySelector("#r-montant").addEventListener("input",updateConv);
    el.querySelector("#r-taux")?.addEventListener("input",updateConv);
    el.querySelector("#r-save").addEventListener("click",async()=>{
      const montant=parseFloat(el.querySelector("#r-montant").value);
      const errEl=el.querySelector("#r-err");
      if(!montant||montant<=0){errEl.innerHTML='<div class="ferr">Montant invalide</div>';return;}
      const devise=devSel.value;
      const t=devise==="EUR"?(parseFloat(el.querySelector("#r-taux").value)||DATA.taux):1;
      DATA.revenus.unshift({id:Date.now(),date:el.querySelector("#r-date").value,desc:el.querySelector("#r-desc").value.trim(),montant,montantNatif:montant,montantCAD:devise==="EUR"?montant*t:montant,devise,taux:t,compte:el.querySelector("#r-compte").value});
      await saveData();refreshTs();flash("Revenu enregistré ✓");showDI("Revenu","+"+fC(devise==="EUR"?montant*t:montant));showTab("home");
    });
  } else {
    el.querySelector("#v-save").addEventListener("click",async()=>{
      const montant=parseFloat(el.querySelector("#v-montant").value);
      const source=el.querySelector("#v-source").value;
      const dest=el.querySelector("#v-dest").value;
      const errEl=el.querySelector("#v-err");
      if(!montant||montant<=0){errEl.innerHTML='<div class="ferr">Montant invalide</div>';return;}
      if(source===dest){errEl.innerHTML='<div class="ferr">Source et destination identiques</div>';return;}
      DATA.virements.unshift({id:Date.now(),date:el.querySelector("#v-date").value,desc:el.querySelector("#v-desc").value.trim(),montant,source,dest});
      await saveData();refreshTs();flash("Virement enregistré ✓");showDI("Virement",fC(montant));showTab("home");
    });
  }
}

// ── HISTORIQUE
let hSearch="",hMois="",hCat="";
function renderHistorique(){
  const el=document.getElementById("tab-historique");
  let all=[...DATA.depenses].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const months=[...new Set(all.map(d=>d.date&&d.date.slice(0,7)).filter(Boolean))].sort().reverse();
  const cats=[...new Set(all.map(d=>d.cat).filter(Boolean))].sort();
  if(hSearch)all=all.filter(d=>(d.desc||"").toLowerCase().includes(hSearch.toLowerCase())||(d.cat||"").toLowerCase().includes(hSearch.toLowerCase()));
  if(hMois)all=all.filter(d=>(d.date||"").startsWith(hMois));
  if(hCat)all=all.filter(d=>d.cat===hCat);
  const byMonth={};
  all.forEach(d=>{const m=(d.date||"").slice(0,7)||"?";if(!byMonth[m])byMonth[m]=[];byMonth[m].push(d);});

  let h=`<div class="fhdr">Historique<div class="fhdr-sub">${DATA.depenses.length} dépenses au total</div></div>
  <div class="search-wrap"><div class="sbar">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Rechercher..." id="h-search" value="${esc(hSearch)}">
  </div></div>
  <div class="chips" id="month-chips">
    <div class="chip ${hMois?"":"on"}" data-mois="">Tous</div>
    ${months.map(m=>{const[y,mo]=m.split("-");const lbl=new Date(y,mo-1).toLocaleString("fr-FR",{month:"short",year:"2-digit"});return `<div class="chip ${hMois===m?"on":""}" data-mois="${m}">${lbl}</div>`;}).join("")}
  </div>
  <div class="chips" id="cat-chips">
    <div class="chip ${hCat?"":"on"}" data-cat="">Toutes</div>
    ${cats.map(c=>`<div class="chip ${hCat===c?"on":""}" data-cat="${esc(c)}">${esc(c)}</div>`).join("")}
  </div>`;

  if(all.length===0){
    h+=`<div style="text-align:center;padding:48px 20px;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">&#128269;</div>Aucune dépense trouvée</div>`;
  } else {
    Object.entries(byMonth).forEach(([month,deps])=>{
      const tot=deps.reduce((a,d)=>a+(parseFloat(d.montant)||0),0);
      const[y,mo]=month.split("-");
      const mn=new Date(y,mo-1).toLocaleString("fr-FR",{month:"long",year:"numeric"});
      h+=`<div class="mhdr"><span>${mn}</span><span class="mtot">${fC(tot)}</span></div><div class="lcard" style="margin:0 16px 8px">`;
      deps.forEach(d=>{
        const who=d.who||"";
        const wc=who==="Pierre"?"wp":who==="Lealin"?"wl":"";
        const badge=who?`<span class="who ${wc}">${esc(who[0])}</span>`:"";
        h+=`<div class="lr tap" data-id="${d.id}"><div><div class="row-t" style="display:flex;align-items:center;gap:6px">${esc(d.desc)}${badge}</div><div class="row-s">${esc(d.cat||"—")} · ${esc(d.date)}</div></div><div class="row-a">${fC(d.montant)}</div></div>`;
      });
      h+=`</div>`;
    });
  }
  el.innerHTML=h;
  el.querySelector("#h-search").addEventListener("input",e=>{hSearch=e.target.value;renderHistorique();});
  el.querySelectorAll("#month-chips .chip").forEach(c=>c.addEventListener("click",()=>{hMois=c.dataset.mois;renderHistorique();}));
  el.querySelectorAll("#cat-chips .chip").forEach(c=>c.addEventListener("click",()=>{hCat=c.dataset.cat;renderHistorique();}));
  el.querySelectorAll(".lr.tap[data-id]").forEach(row=>row.addEventListener("click",()=>openDepDetail(row.dataset.id)));
}

// ── PREVISIONS
let prevSc="reel";
function renderPrevisions(sc){
  prevSc=sc;
  if(!DATA.previsions)DATA.previsions={};
  const pd=DATA.previsions[sc]||{};
  const months=[];const now=new Date();
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);months.push({key:d.toISOString().slice(0,7),label:d.toLocaleString("fr-FR",{month:"long",year:"numeric"})});}
  const totFix=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
  const el=document.getElementById("tab-previsions");

  let h=`<div class="fhdr">Prévisions<div class="fhdr-sub">3 prochains mois</div></div>
  <div class="pscen">
    <button class="psb ${sc==="reel"?"on":""}" id="ps-reel">Réaliste</button>
    <button class="psb ${sc==="optimiste"?"on":""}" id="ps-opt">Optimiste</button>
  </div>`;
  months.forEach(({key,label})=>{
    const items=pd[key]||[];
    const revs=items.filter(i=>i.type==="revenu").reduce((a,i)=>a+i.montant,0);
    const deps=items.filter(i=>i.type==="depense").reduce((a,i)=>a+i.montant,0);
    const solde=revs-totFix-deps;
    h+=`<div class="pmc"><div class="pmh"><div class="pmname">${label}</div><div class="psolde ${solde>=0?"pos":"neg"}">${fC(solde)}</div></div>`;
    h+=`<div class="pdr"><div><div class="pname">Dépenses fixes</div><div class="ptype">Récurrentes</div></div><div class="pamt db">${fC(totFix)}</div></div>`;
    items.forEach((item,idx)=>{
      h+=`<div class="pdr"><div><div class="pname">${esc(item.nom)}</div><div class="ptype">${item.type==="revenu"?"Revenu prévu":"Dépense prévue"}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="pamt ${item.type==="revenu"?"cr":"db"}">${item.type==="revenu"?"+":""}${fC(item.montant)}</div><button class="pdel-btn" data-key="${key}" data-idx="${idx}" style="background:var(--red-l);border:none;border-radius:6px;color:var(--red);width:24px;height:24px;cursor:pointer;font-size:16px">×</button></div></div>`;
    });
    h+=`<button class="padd" data-addkey="${key}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Ajouter</button></div>`;
  });
  el.innerHTML=h;
  el.querySelector("#ps-reel").addEventListener("click",()=>renderPrevisions("reel"));
  el.querySelector("#ps-opt").addEventListener("click",()=>renderPrevisions("optimiste"));
  el.querySelectorAll(".pdel-btn").forEach(btn=>btn.addEventListener("click",async()=>{
    const key=btn.dataset.key;const idx=parseInt(btn.dataset.idx);
    if(DATA.previsions[prevSc]&&DATA.previsions[prevSc][key]){DATA.previsions[prevSc][key].splice(idx,1);await saveData();renderPrevisions(prevSc);}
  }));
  el.querySelectorAll(".padd[data-addkey]").forEach(btn=>btn.addEventListener("click",()=>addPrevModal(btn.dataset.addkey)));
}

function addPrevModal(monthKey){
  const o=document.getElementById("overlay");
  const d=document.createElement("div");d.className="modal";
  d.innerHTML=`<div class="modal-handle"></div>
    <div style="font-size:20px;font-weight:800;color:var(--text1);margin-bottom:16px">Ajouter une entrée</div>
    <div class="fsec" style="margin-bottom:12px">
      <div class="frow"><div class="flbl">Type</div><select id="pv-type"><option value="depense">Dépense prévue</option><option value="revenu">Revenu prévu</option></select></div>
      <div class="frow"><div class="flbl">Nom</div><input id="pv-nom" type="text" placeholder="Ex : Bonus"></div>
      <div class="frow"><div class="flbl">Montant</div><input id="pv-amt" type="number" inputmode="decimal" placeholder="0"></div>
    </div>
    <div class="btn-row"><button class="btn ghost sml" id="pv-cancel">Annuler</button><button class="btn green" style="flex:1" id="pv-confirm">Ajouter</button></div>`;
  o.innerHTML="";o.appendChild(d);o.classList.remove("hidden");
  o.onclick=()=>closeModal();d.onclick=e=>e.stopPropagation();
  d.querySelector("#pv-cancel").addEventListener("click",closeModal);
  d.querySelector("#pv-confirm").addEventListener("click",async()=>{
    const nom=d.querySelector("#pv-nom").value.trim();
    const montant=parseFloat(d.querySelector("#pv-amt").value);
    const type=d.querySelector("#pv-type").value;
    if(!nom||!montant||montant<=0)return;
    if(!DATA.previsions)DATA.previsions={};
    if(!DATA.previsions[prevSc])DATA.previsions[prevSc]={};
    if(!DATA.previsions[prevSc][monthKey])DATA.previsions[prevSc][monthKey]=[];
    DATA.previsions[prevSc][monthKey].push({nom,montant,type});
    await saveData();closeModal();renderPrevisions(prevSc);
  });
}

    h+=`<div class="slbl">Gérer les comptes</div>`;
    DATA.comptes.forEach((c,i)=>{
      const flagOpts=FLAGS.map(f=>`<option value="${f}"${f===c.flag?" selected":""}>${f}</option>`).join("");
      h+=`<div class="cecard"><div class="cerow"><div class="ceflag">${esc(c.flag||"🏦")}<select class="ce-flag-sel" data-idx="${i}">${flagOpts}</select></div><input class="cename" type="text" value="${esc(c.label)}" data-idx="${i}" data-field="label"><select class="cedev" data-idx="${i}" data-field="devise"><option value="CAD"${c.devise==="CAD"?" selected":""}>CAD</option><option value="EUR"${c.devise==="EUR"?" selected":""}>EUR</option><option value="USD"${c.devise==="USD"?" selected":""}>USD</option></select>${DATA.comptes.length>1?`<button class="cedel" data-delidx="${i}">×</button>`:""}</div><div class="ouvrow"><div class="ouvlbl">Ouverture :</div><input class="ouvinp" type="number" value="${DATA.ouv[c.id]||0}" data-id="${c.id}"></div></div>`;
    });
    h+=`<div id="add-compte-area" style="padding:0 16px"><button class="btn ghost" id="add-compte-btn">+ Ajouter un compte</button></div><div style="padding:12px 16px 16px"><button class="btn" id="save-comptes-btn">Enregistrer les modifications</button></div>`;
  }

  if(sec==="fixes"){
    const tot=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);
    h+=`<div class="slbl">Dépenses fixes mensuelles</div><div class="scard" style="margin:0 16px">`;
    DATA.fixes.forEach((f,i)=>{h+=`<div class="fixrow"><input class="fixname" type="text" value="${esc(f.nom)}" placeholder="Nom" data-fidx="${i}"><input class="fixamt" type="number" value="${f.montant}" data-fidx="${i}"><button class="fixdel" data-delidx="${i}">×</button></div>`;});
    h+=`<div class="fixtot" id="fix-total">Total : <strong>${fC(tot)}</strong></div></div>`;
    h+=`<div style="padding:12px 16px 0"><button class="btn ghost" id="add-fix-btn">+ Ajouter</button></div><div style="padding:12px 16px 16px"><button class="btn" id="save-fixes-btn">Enregistrer</button></div>`;
  }

  if(sec==="objectifs"){
    const objs=(DATA.objectifs&&DATA.objectifs.length)?DATA.objectifs:JSON.parse(JSON.stringify(DEF_OBJS));
    h+=`<div class="slbl">Vos objectifs</div>`;
    objs.forEach((o,i)=>{
      h+=`<div class="oecard"><div class="frow"><input style="flex:1;border:none;background:none;font-size:15px;font-weight:600;outline:none;padding:14px 0" value="${esc(o.nom)}" data-oidx="${i}" data-ofield="nom">${objs.length>1?`<button class="cedel" data-delidx="${i}">×</button>`:""}</div><div class="frow" style="border-top:.5px solid var(--gray2)"><div class="flbl">Cible</div><input type="number" style="flex:1;border:none;background:none;font-size:15px;outline:none;text-align:right;padding:14px 0" value="${o.cible}" data-oidx="${i}" data-ofield="cible"></div><div class="frow" style="border-top:.5px solid var(--gray2)"><div class="flbl">Accumulé</div><input type="number" style="flex:1;border:none;background:none;font-size:15px;color:var(--teal);font-weight:600;outline:none;text-align:right;padding:14px 0" value="${o.acc||0}" data-oidx="${i}" data-ofield="acc"></div><div class="frow" style="border-top:.5px solid var(--gray2)"><div class="flbl">Date cible</div><input type="month" style="flex:1;border:none;background:none;font-size:15px;outline:none;text-align:right;padding:14px 0" value="${o.dt||""}" data-oidx="${i}" data-ofield="dt"></div></div>`;
    });
    h+=`<div style="padding:0 16px"><button class="btn ghost" id="add-obj-btn">+ Ajouter</button></div><div style="padding:12px 16px 16px"><button class="btn" id="save-objs-btn">Enregistrer</button></div>`;
  }

  if(sec==="taux"){
    h+=`<div class="slbl">Taux de change</div><div class="scard" style="margin:0 16px"><div class="srow"><div class="smain"><div class="stit">EUR → CAD</div><div class="ssub">Modifier lors d'un virement France → Canada</div></div><input id="taux-inp" type="number" step="0.0001" value="${DATA.taux}" style="width:90px;text-align:right;border:none;background:none;font-size:16px;font-weight:700;color:var(--teal);outline:none"></div><div class="srow"><div class="ssub" id="taux-prev">1 EUR = ${Number(DATA.taux).toFixed(4)} CAD</div></div></div>`;
    h+=`<div style="padding:12px 16px 16px"><button class="btn" id="save-taux-btn">Enregistrer le taux</button></div>`;
    h+=`<div class="slbl">Session</div><div style="padding:0 16px 100px"><button class="btn ghost" id="logout-btn" style="color:var(--red);border-color:rgba(220,38,38,.3)">Se déconnecter</button></div>`;
  }

  // Show reglages tab
  ["home","depense","argent","historique","previsions"].forEach(t=>{
    document.getElementById("tab-"+t).classList.add("hidden");
    document.getElementById("nb-"+t)?.classList.remove("on");
  });

  el.innerHTML=h;

  // Wire seg buttons
  el.querySelector("#rg-comptes")?.addEventListener("click",()=>renderReglages("comptes"));
  el.querySelector("#rg-fixes")?.addEventListener("click",()=>renderReglages("fixes"));
  el.querySelector("#rg-objs")?.addEventListener("click",()=>renderReglages("objectifs"));
  el.querySelector("#rg-taux")?.addEventListener("click",()=>renderReglages("taux"));

  // COMPTES events
  if(sec==="comptes"){
    el.querySelectorAll(".ce-flag-sel").forEach(sel=>sel.addEventListener("change",()=>{const i=parseInt(sel.dataset.idx);DATA.comptes[i].flag=sel.value;const flagDiv=sel.parentElement;flagDiv.childNodes[0].textContent=sel.value;}));
    el.querySelectorAll(".cename").forEach(inp=>inp.addEventListener("input",()=>{DATA.comptes[parseInt(inp.dataset.idx)].label=inp.value;}));
    el.querySelectorAll(".cedev").forEach(sel=>sel.addEventListener("change",()=>{DATA.comptes[parseInt(sel.dataset.idx)].devise=sel.value;}));
    el.querySelectorAll(".ouvinp").forEach(inp=>inp.addEventListener("input",()=>{DATA.ouv[inp.dataset.id]=parseFloat(inp.value)||0;}));
    el.querySelectorAll(".cedel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.delidx);
      if(DATA.comptes.length<=1)return;
      delete DATA.ouv[DATA.comptes[i].id];DATA.comptes.splice(i,1);renderReglages("comptes");
    }));
    el.querySelector("#add-compte-btn").addEventListener("click",()=>showAddCompteForm(el));
    el.querySelector("#save-comptes-btn").addEventListener("click",async()=>{
      await saveData();const b=el.querySelector("#save-comptes-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer les modifications";b.classList.remove("green");},1500);flash("Enregistré ✓");
    });
  }
  // FIXES events
  if(sec==="fixes"){
    el.querySelectorAll(".fixname").forEach(inp=>inp.addEventListener("input",()=>{DATA.fixes[parseInt(inp.dataset.fidx)].nom=inp.value;}));
    el.querySelectorAll(".fixamt").forEach(inp=>inp.addEventListener("input",()=>{DATA.fixes[parseInt(inp.dataset.fidx)].montant=parseFloat(inp.value)||0;const t=DATA.fixes.reduce((a,f)=>a+(parseFloat(f.montant)||0),0);const tot=el.querySelector("#fix-total");if(tot)tot.innerHTML=`Total : <strong>${fC(t)}</strong>`;}));
    el.querySelectorAll(".fixdel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{DATA.fixes.splice(parseInt(btn.dataset.delidx),1);renderReglages("fixes");}));
    el.querySelector("#add-fix-btn").addEventListener("click",()=>{DATA.fixes.push({id:Date.now(),nom:"",montant:0});renderReglages("fixes");});
    el.querySelector("#save-fixes-btn").addEventListener("click",async()=>{await saveData();const b=el.querySelector("#save-fixes-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer";b.classList.remove("green");},1500);flash("Enregistré ✓");});
  }
  // OBJECTIFS events
  if(sec==="objectifs"){
    const objs=(DATA.objectifs&&DATA.objectifs.length)?DATA.objectifs:JSON.parse(JSON.stringify(DEF_OBJS));
    if(!DATA.objectifs||!DATA.objectifs.length)DATA.objectifs=objs;
    el.querySelectorAll("[data-oidx][data-ofield]").forEach(inp=>inp.addEventListener("input",()=>{const i=parseInt(inp.dataset.oidx);const f=inp.dataset.ofield;DATA.objectifs[i][f]=f==="nom"||f==="dt"?inp.value:parseFloat(inp.value)||0;}));
    el.querySelectorAll(".cedel[data-delidx]").forEach(btn=>btn.addEventListener("click",()=>{DATA.objectifs.splice(parseInt(btn.dataset.delidx),1);renderReglages("objectifs");}));
    el.querySelector("#add-obj-btn").addEventListener("click",()=>{if(!DATA.objectifs||!DATA.objectifs.length)DATA.objectifs=JSON.parse(JSON.stringify(DEF_OBJS));DATA.objectifs.push({id:Date.now(),nom:"Nouvel objectif",cible:10000,acc:0,dt:""});renderReglages("objectifs");});
    el.querySelector("#save-objs-btn").addEventListener("click",async()=>{
      await saveData();
      const b=el.querySelector("#save-objs-btn");b.textContent="Enregistré ✓";b.classList.add("green");setTimeout(()=>{b.textContent="Enregistrer";b.classList.remove("green");},1500);
      flash("Objectifs enregistrés ✓");
      DATA.objectifs.forEach(o=>{if((o.acc||0)>=o.cible&&o.cible>0)setTimeout(()=>flash("🎉 "+o.nom+" atteint !"),600);});
    });
  }
  // TAUX events
  if(sec==="taux"){
    el.querySelector("#taux-inp").addEventListener("input",()=>{const v=parseFloat(el.querySelector("#taux-inp").value)||DATA.taux;el.querySelector("#taux-prev").textContent=`1 EUR = ${v.toFixed(4)} CAD`;});
    el.querySelector("#save-taux-btn").addEventListener("click",async()=>{DATA.taux=parseFloat(el.querySelector("#taux-inp").value)||DATA.taux;await saveData();flash("Taux mis à jour ✓");});
    el.querySelector("#logout-btn").addEventListener("click",()=>{localStorage.removeItem("budget_code");localStorage.removeItem("budget_ts");if(unsub)unsub();showLock(null);});
  }
}
window.renderReglages=renderReglages;

function showAddCompteForm(el){
  const area=el.querySelector("#add-compte-area");
  const flagOpts=FLAGS.map(f=>`<option value="${f}">${f}</option>`).join("");
  area.innerHTML=`<div class="addbox"><div class="addtitle">Nouveau compte</div><div class="addinputs"><select id="nc-flag">${flagOpts}</select><input type="text" id="nc-label" placeholder="Nom"><select id="nc-devise"><option value="CAD">CAD</option><option value="EUR">EUR</option><option value="USD">USD</option></select></div><div class="btn-row"><button class="btn ghost sml" id="nc-cancel">Annuler</button><button class="btn green sml" id="nc-confirm">Ajouter</button></div></div>`;
  area.querySelector("#nc-cancel").addEventListener("click",()=>renderReglages("comptes"));
  area.querySelector("#nc-confirm").addEventListener("click",()=>{
    const label=area.querySelector("#nc-label").value.trim();
    if(!label)return;
    const id="c_"+Date.now();
    DATA.comptes.push({id,label,devise:area.querySelector("#nc-devise").value,flag:area.querySelector("#nc-flag").value});
    DATA.ouv[id]=0;
    renderReglages("comptes");flash("Compte ajouté ✓");
  });
}
</script>
</body>
</html>
